<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Body No 관리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F2A3C">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Body No">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1F5;
    --surface:#FFFFFF;
    --ink:#1C2530;
    --muted:#7C8798;
    --line:#DDE2E9;
    --primary:#1F2A3C;
    --primary-2:#2B3A52;
    --accent:#F5A623;
    --accent-ink:#5A3B00;
    --success:#1E9E5A;
    --success-bg:#E7F7EE;
    --danger:#D64545;
    --danger-bg:#FDEBEB;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior-y:contain;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    overscroll-behavior:none;
    user-select:none;
  }
  input,textarea{user-select:text;}
  #app{
    display:flex;
    flex-direction:column;
    height:100vh;
    height:calc(var(--vh, 1vh) * 100);
    height:100dvh;
    max-width:720px;
    margin:0 auto;
    background:var(--bg);
    position:relative;
    overflow:hidden;
  }
  /* Header */
  header{
    background:var(--primary);
    color:#fff;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    z-index:5;
  }
  header .title{
    font-family:'Bebas Neue',sans-serif;
    font-size:22px;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  header .title .dot{
    width:9px;height:9px;border-radius:50%;
    background:#5B6B85;
    box-shadow:0 0 0 3px rgba(255,255,255,.06);
  }
  header .title .dot.on{background:#3ED17E;}
  header .worker{
    font-size:13px;
    background:rgba(255,255,255,.1);
    padding:6px 12px;
    border-radius:999px;
    font-weight:600;
    max-width:150px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  /* Toast */
  #toast{
    position:absolute;
    top:66px;left:12px;right:12px;
    z-index:20;
    display:none;
    padding:14px 16px;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
    text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,.15);
    animation:slideDown .25s ease;
  }
  @keyframes slideDown{from{transform:translateY(-14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  #toast.success{background:var(--success-bg);color:var(--success);border:1.5px solid var(--success);}
  #toast.danger{background:var(--danger-bg);color:var(--danger);border:1.5px solid var(--danger);}
  #toast.info{background:#EAF1FB;color:#2560B0;border:1.5px solid #2560B0;}

  main{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    overscroll-behavior-y:contain;
    padding:16px 16px 24px;
    -webkit-overflow-scrolling:touch;
  }
  .card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
    border:1px solid var(--line);
  }
  .card h3{
    margin:0 0 10px;
    font-size:16px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h3 .badge{
    font-family:'Roboto Mono',monospace;
    font-size:11px;
    background:var(--primary);
    color:#fff;
    padding:2px 7px;
    border-radius:6px;
  }
  .field{margin-bottom:12px;}
  .two-col{display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:14px;}
  .field:last-child{margin-bottom:0;}
  label.lbl{
    display:block;
    font-size:12.5px;
    color:var(--muted);
    font-weight:600;
    margin-bottom:6px;
  }
  input[type=text], input[type=url], input[type=file], select, textarea.ta{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:15px;
    font-family:inherit;
    background:#FAFBFC;
    color:var(--ink);
  }
  input[type=text]:focus, input[type=url]:focus, select:focus, textarea.ta:focus{
    outline:none;
    border-color:var(--accent);
    background:#fff;
  }
  textarea.ta{resize:vertical;font-size:16px;min-height:80px;}
  .help{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
  .row{display:flex;gap:8px;}
  .row input{flex:1;}
  .device-type-select{flex:0 0 92px;width:92px;font-weight:700;}
  button{font-family:inherit;cursor:pointer;border:none;touch-action:manipulation;}
  .btn{
    padding:12px 16px;
    border-radius:10px;
    font-weight:700;
    font-size:14.5px;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-primary:active{transform:scale(.98);}
  .btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--line);}
  .btn-danger-outline{background:#fff;color:var(--danger);border:1.5px solid var(--danger);}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.45;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .chip{
    display:flex;align-items:center;gap:6px;
    background:var(--primary);
    color:#fff;
    padding:7px 8px 7px 12px;
    border-radius:999px;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:14px;
    letter-spacing:1px;
  }
  .chip button{
    background:rgba(255,255,255,.18);
    color:#fff;
    width:20px;height:20px;
    border-radius:50%;
    font-size:13px;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
  }
  .empty .big{font-size:34px;margin-bottom:8px;}
  .empty p{margin:4px 0;font-size:14px;line-height:1.6;}

  /* Bottom nav */
  nav{
    display:flex;
    background:#fff;
    border-top:1px solid var(--line);
    flex-shrink:0;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;
    background:none;
    padding:10px 4px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:3px;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    min-height:62px;
  }
  nav button .ic{
    font-size:20px;
    height:24px;
    line-height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  nav button.active{color:var(--accent-ink);}
  nav button.active .ic{
    color:var(--accent);
  }

  /* Capture tab */
  .code-select-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:10px;
    margin-top:6px;
  }
  .code-btn{
    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    padding:16px 8px;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:20px;
    letter-spacing:2px;
    color:var(--primary);
  }
  .code-btn.selected{border-color:var(--accent);background:#FFF7E8;color:var(--accent-ink);}

  .code-pill-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
  .code-pill-row .inline-label{
    font-size:15px;font-weight:700;color:var(--muted);margin-right:2px;flex-shrink:0;
  }
  .code-pill{
    background:#fff;
    border:2px solid var(--line);
    border-radius:10px;
    padding:8px 16px;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:15px;
    letter-spacing:1px;
    color:var(--primary);
  }
  .code-pill.selected{border-color:var(--accent);background:#FFF7E8;color:var(--accent-ink);}

  .mode-row{display:flex;gap:10px;}

  .search-row{display:flex;gap:8px;margin-bottom:14px;align-items:stretch;}
  .search-toggle{
    flex:1;
    display:flex;align-items:center;gap:8px;
    background:#EAF1FB;border:1.5px solid #2560B0;border-radius:10px;
    padding:10px 12px;font-size:16px;font-weight:600;color:#2560B0;
  }
  .search-toggle input[type=checkbox]{width:19px;height:19px;accent-color:#2560B0;flex-shrink:0;}

  .search-badge{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:10px;border:1.5px solid var(--line);
    padding:6px 10px;font-weight:700;text-align:center;
    font-family:'Roboto Mono',monospace;letter-spacing:.5px;
  }
  .search-badge-body{font-size:17px;line-height:1.1;}
  .search-badge-tag{font-size:14px;line-height:1.1;font-family:'Inter',sans-serif;letter-spacing:0;margin-top:1px;}
  .search-badge.empty{color:var(--muted);font-family:'Inter',sans-serif;font-weight:600;font-size:12px;letter-spacing:0;background:#FAFBFC;}
  .search-badge.no-target-badge{font-size:15px;line-height:1.15;}
  .search-badge.found{background:var(--success-bg);border-color:var(--success);color:var(--success);}
  .search-badge.notfound{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}

  .mode-btn{
    flex:1;
    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    padding:14px 6px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:16px;
    line-height:1.05;
    color:var(--ink);
  }
  .mode-btn.selected{border-color:var(--accent);background:#FFF7E8;color:var(--accent-ink);}

  .capture-head{
    display:grid;
    grid-template-columns:auto repeat(6, minmax(0,1fr));
    gap:8px;
    margin-bottom:14px;
  }
  .capture-head .code-tag{
    font-family:'Bebas Neue',sans-serif;
    font-size:26px;
    background:var(--primary);
    color:#fff;
    padding:0 10px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .code-tag .code-tag-text{letter-spacing:5px;margin-right:-5px;}

  .capture-stats{display:flex;gap:8px;margin-bottom:10px;}
  .stat-box{
    flex:1;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 10px;
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:8px;
  }
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--primary);line-height:1;}
  .stat-lbl{font-size:19px;color:var(--muted);font-weight:600;}

  .link-btn{
    background:none;color:#2560B0;font-weight:700;font-size:13px;
    text-decoration:underline;
  }

  .digit-box{
    width:100%;
    min-width:0;
    max-width:56px;
    aspect-ratio:1/1.15;
    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue',sans-serif;
    font-size:30px;
    color:var(--primary);
  }
  .digit-box.filled{border-color:var(--primary);}
  .digit-box.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(245,166,35,.18);}

  .keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .key{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:14px;
    font-family:'Bebas Neue',sans-serif;
    font-size:32px;
    color:var(--ink);
    padding:14px 0;
  }
  .key:active{background:#F0F2F5;}
  .key.func{
    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:700;
    color:var(--muted);
  }
  .submit-btn{
    margin-top:4px;
    margin-bottom:14px;
    padding:15px;
    font-size:19px;
    border-radius:14px;
  }
  .capture-submit-btn{margin-top:18px;}

  /* 화면 크기에 맞춘 연속 조정: 넘치면 줄이고(음수) 남으면 늘리는(양수) 걸 하나의 변수로 통일.
     JS가 매 렌더링마다 실제 여백을 측정해서 --adj-* 변수를 갱신하고, 아래 규칙들이 그 값만큼 항상 반영함.
     클래스 온오프 방식이 아니라 값 자체가 0이면 자동으로 원래 크기와 동일해짐. */
  #app.capture-adjustable .keypad{gap:clamp(3px, calc(8px + var(--adj-gap,0px)), 18px);}
  #app.capture-adjustable .key{
    padding:clamp(5px, calc(14px + var(--adj-key-pad,0px)), 30px) 0;
    font-size:clamp(17px, calc(32px + var(--adj-key-font,0px)), 46px);
  }
  #app.capture-adjustable .key.func{font-size:clamp(10px, calc(15px + var(--adj-key-font,0px) * 0.4), 20px);}
  #app.capture-adjustable .digit-box{max-width:clamp(36px, calc(56px + var(--adj-box-extra,0px)), 76px);}
  #app.capture-adjustable .submit-btn{
    padding:clamp(8px, calc(15px + var(--adj-btn-pad,0px)), 26px);
    font-size:clamp(13px, calc(19px + var(--adj-btn-font,0px)), 24px);
    margin-top:clamp(0px, calc(4px + var(--adj-key-pad,0px) * 0.3), 8px);
    margin-bottom:clamp(4px, calc(14px + var(--adj-key-pad,0px) * 0.5), 18px);
  }
  #app.capture-adjustable .capture-submit-btn{
    margin-top:clamp(6px, calc(18px + var(--adj-key-pad,0px) * 0.5), 24px);
  }
  #app.capture-adjustable .capture-stats{margin-bottom:clamp(4px, calc(14px + var(--adj-key-pad,0px) * 0.5), 20px);}
  #app.capture-adjustable .search-row{margin-bottom:clamp(4px, calc(14px + var(--adj-key-pad,0px) * 0.5), 20px);}
  #app.capture-adjustable .capture-head{margin-bottom:clamp(4px, calc(14px + var(--adj-key-pad,0px) * 0.5), 20px);}
  #app.capture-adjustable .stat-box{padding:clamp(4px, calc(10px + var(--adj-key-pad,0px) * 0.4), 16px) 8px;}
  #app.capture-adjustable .stat-num{font-size:clamp(20px, calc(34px + var(--adj-key-font,0px)), 44px);}
  #app.capture-adjustable .stat-lbl{font-size:clamp(13px, calc(19px + var(--adj-key-font,0px) * 0.5), 24px);}
  #app.capture-adjustable .code-tag{
    font-size:clamp(18px, calc(26px + var(--adj-key-font,0px) * 0.7), 34px);
    padding:0 clamp(10px, calc(16px + var(--adj-key-pad,0px) * 0.5), 22px);
  }
  #app.capture-adjustable .code-pill{
    font-size:clamp(12px, calc(15px + var(--adj-key-font,0px) * 0.35), 19px);
    padding:clamp(6px, calc(8px + var(--adj-key-pad,0px) * 0.35), 13px) clamp(12px, calc(16px + var(--adj-key-pad,0px) * 0.5), 22px);
  }
  #app.capture-adjustable .mode-btn{
    font-size:clamp(13px, calc(16px + var(--adj-key-font,0px) * 0.3), 19px);
    padding:clamp(10px, calc(14px + var(--adj-key-pad,0px) * 0.4), 20px) 6px;
  }
  #app.capture-adjustable .issue-top-card{
    padding:clamp(8px, calc(16px + var(--adj-key-pad,0px) * 0.5), 20px);
    margin-bottom:clamp(4px, calc(14px + var(--adj-key-pad,0px) * 0.5), 20px);
  }
  #app.capture-adjustable .issue-top-card .field{margin-bottom:clamp(4px, calc(10px + var(--adj-key-pad,0px) * 0.4), 12px);}
  #app.capture-adjustable textarea.ta{height:clamp(70px, calc(88px + var(--adj-key-pad,0px) * 2), 116px);}
  #app.hide-stats .capture-stats{display:none;}

  /* Status tab */
  .stat-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .stat-head .sync{font-size:11.5px;color:var(--muted);}
  .progress-num{
    font-family:'Bebas Neue',sans-serif;
    font-size:44px;
    line-height:1;
    color:var(--primary);
  }
  .progress-num span{font-size:20px;color:var(--muted);font-family:'Inter',sans-serif;font-weight:700;}
  .progress-bar-track{
    height:12px;background:#EDEFF2;border-radius:999px;overflow:hidden;margin-top:10px;
  }
  .progress-bar-fill{
    height:100%;background:linear-gradient(90deg,var(--accent),#FFC15E);
    border-radius:999px;transition:width .3s ease;
  }
  .mini-stats-row{display:flex;gap:8px;margin-top:14px;}
  .mini-stat{
    flex:1;
    border-radius:10px;
    padding:10px 6px;
    text-align:center;
    background:#F5F6F8;
    border:1px solid var(--line);
  }
  .mini-stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--primary);line-height:1;}
  .mini-stat-lbl{font-size:10.5px;color:var(--muted);margin-top:4px;font-weight:600;}
  .mini-stat.mini-in{background:var(--success-bg);border-color:var(--success);}
  .mini-stat.mini-in .mini-stat-num{color:var(--success);}
  .mini-stat.mini-out{background:var(--danger-bg);border-color:var(--danger);}
  .mini-stat.mini-out .mini-stat-num{color:var(--danger);}
  .mini-stat.mini-issue{background:#FFF7E8;border-color:var(--accent);}
  .mini-stat.mini-issue .mini-stat-num{color:var(--accent-ink);}
  .search-box{margin-bottom:10px;}

  .tag{
    display:inline-block;
    font-family:'Inter',sans-serif;
    font-size:10px;
    font-weight:700;
    padding:2px 7px;
    border-radius:6px;
    margin-right:6px;
    letter-spacing:0;
    vertical-align:middle;
  }
  .tag-in{background:var(--success-bg);color:var(--success);}
  .tag-out{background:var(--danger-bg);color:var(--danger);}

  .agg-checks{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;}
  .agg-checks label{display:flex;align-items:center;gap:7px;font-size:16px;font-weight:600;color:var(--ink);}
  .agg-checks input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);}

  .agg-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:10px;}
  .agg-table{width:100%;border-collapse:collapse;font-size:16px;}
  .agg-table th{
    text-align:left;padding:9px 12px;background:#F5F6F8;color:var(--muted);
    font-weight:700;font-size:16px;border-bottom:1.5px solid var(--line);white-space:nowrap;
  }
  .agg-table td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .agg-table tbody tr:last-child td{border-bottom:none;}
  .agg-table td.agg-count{font-weight:700;text-align:right;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--primary);padding-top:5px;padding-bottom:5px;}
  .agg-table td.mono-cell{font-family:'Roboto Mono',monospace;font-weight:700;letter-spacing:1px;color:var(--primary);}
  .agg-table tfoot td{font-weight:800;border-top:2px solid var(--primary);background:#FAFBFC;}
  .agg-table th .th-filter{
    width:auto;
    padding:3px 20px 3px 4px;
    border:none;
    background:#F5F6F8;
    color:var(--primary);
    font-size:11px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .agg-table th .th-filter:focus{outline:none;background:#fff;}

  .rec-item{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:8px;
  }
  .rec-item .rec-body{
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:15px;
    letter-spacing:1px;
  }
  .rec-item .rec-sub{
    font-size:11px;color:var(--muted);margin-top:2px;
  }
  .rec-item .rec-meta{
    font-size:11.5px;color:var(--muted);text-align:right;flex-shrink:0;line-height:1.6;
  }
  .rec-item .rec-meta .worker{font-weight:700;color:var(--ink);display:block;}
  .rec-item .rec-meta .rec-device{display:block;color:var(--muted);}

  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.45);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-bg.show{display:flex;}
  .modal{
    background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%;
  }
  .modal h4{margin:0 0 8px;font-size:17px;}
  .modal p{margin:0 0 18px;font-size:13.5px;color:var(--muted);line-height:1.6;}
  .modal .row{gap:10px;}

  @media (min-width:700px){
    header .title{font-size:26px;}
    .digit-box{max-width:70px;}
    .key{padding:26px 0;font-size:32px;}
    main{padding:22px 28px 28px;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;flex-direction:column;">
      <div class="title"><span class="dot" id="connDot"></span> BODY NO 관리<span id="tabName"></span> <span id="verTag" style="font-size:13px;color:rgba(255,255,255,.65);font-weight:600;"></span></div>
    </div>
    <div class="worker" id="workerBadge">작업자 미설정</div>
  </header>
  <div id="toast"></div>
  <main id="main"></main>
  <nav>
    <button data-tab="setup"><span class="ic">⚙</span>설정</button>
    <button data-tab="capture"><span class="ic">🔢</span>등록</button>
    <button data-tab="issues"><span class="ic">⚠</span>이상조치</button>
    <button data-tab="pending"><span class="ic">⏳</span>미진행</button>
    <button data-tab="status"><span class="ic">📊</span>현황</button>
  </nav>
</div>

<div class="modal-bg" id="resetModal">
  <div class="modal">
    <h4>전체 초기화</h4>
    <p>작업자, 차종코드, 연동 설정, 대상 리스트 캐시, 저장된 취득 기록이 모두 삭제됩니다.<br>이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?</p>
    <div class="row">
      <button class="btn btn-outline btn-block" onclick="closeResetModal()">취소</button>
      <button class="btn btn-danger-outline btn-block" onclick="confirmReset()">초기화</button>
    </div>
  </div>
</div>

<script>
/* ---------------- State ---------------- */
const STORAGE_KEY = 'bodyno_tracker_state_v1';
function defaultState(){
  return { worker:'', devices:[], carCodes:[], gasUrl:'', inputMode:'manual', targetList:[], myRecords:[], allRecordsCache:null, lastSync:null, issues:[], projects:[], activeProjectId:null };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
  }catch(e){ return defaultState(); }
}
function saveState(){
  if(typeof syncActiveProjectFromTopLevel === 'function') syncActiveProjectFromTopLevel();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function migrateToProjects(){
  if(state.projects && state.projects.length){
    if(!state.activeProjectId) state.activeProjectId = state.projects[0].id;
    return;
  }
  const id = 'p_' + Date.now();
  state.projects = [{
    id,
    name: '기본 프로젝트',
    gasUrl: state.gasUrl || '',
    carCodes: state.carCodes || [],
    targetList: state.targetList || [],
    myRecords: state.myRecords || [],
    allRecordsCache: state.allRecordsCache !== undefined ? state.allRecordsCache : null,
    lastSync: state.lastSync || null,
    issues: state.issues || []
  }];
  state.activeProjectId = id;
}
migrateToProjects();

function getActiveProject(){
  return state.projects.find(p => p.id === state.activeProjectId) || state.projects[0];
}
function syncActiveProjectFromTopLevel(){
  const proj = getActiveProject();
  if(!proj) return;
  proj.gasUrl = state.gasUrl;
  proj.carCodes = state.carCodes;
  proj.targetList = state.targetList;
  proj.myRecords = state.myRecords;
  proj.allRecordsCache = state.allRecordsCache;
  proj.lastSync = state.lastSync;
  proj.issues = state.issues;
}
function loadProjectIntoTopLevel(proj){
  state.gasUrl = proj.gasUrl || '';
  state.carCodes = proj.carCodes || [];
  state.targetList = proj.targetList || [];
  state.myRecords = proj.myRecords || [];
  state.allRecordsCache = proj.allRecordsCache !== undefined ? proj.allRecordsCache : null;
  state.lastSync = proj.lastSync || null;
  state.issues = proj.issues || [];
}
function switchProject(id){
  if(id === state.activeProjectId) return;
  syncActiveProjectFromTopLevel();
  const proj = state.projects.find(p => p.id === id);
  if(!proj) return;
  state.activeProjectId = id;
  loadProjectIntoTopLevel(proj);
  saveState();
  rebuildTargetSet();
  selectedCode = null;
  issueSelectedCode = null;
  selectedDevice = state.devices[0] || null;
  digits = '';
  issueDigits = '';
  searchMode = false;
  searchResult = null;
  toast('info', `"${proj.name}" 프로젝트로 전환했습니다.`);
  render();
  if(state.gasUrl) syncStatus();
}
function addProject(){
  const nameInp = document.getElementById('newProjectNameInput');
  if(!nameInp) return;
  const name = nameInp.value.trim();
  if(!name){ toast('danger','프로젝트 이름을 입력해주세요.'); return; }
  if(state.projects.some(p => p.name === name)){ toast('danger','이미 같은 이름의 프로젝트가 있습니다.'); return; }
  syncActiveProjectFromTopLevel();
  const id = 'p_' + Date.now();
  const proj = { id, name, gasUrl:'', carCodes:[], targetList:[], myRecords:[], allRecordsCache:null, lastSync:null, issues:[] };
  state.projects.push(proj);
  state.activeProjectId = id;
  loadProjectIntoTopLevel(proj);
  saveState();
  rebuildTargetSet();
  addingProject = false;
  toast('success', `"${name}" 프로젝트를 추가했습니다. 연동 URL을 입력해주세요.`);
  render();
}
function deleteProject(id){
  if(state.projects.length <= 1){ toast('danger','최소 1개의 프로젝트는 있어야 합니다.'); return; }
  const proj = state.projects.find(p => p.id === id);
  if(!proj) return;
  if(!confirm(`"${proj.name}" 프로젝트를 삭제하시겠습니까? 이 프로젝트의 모든 기록이 삭제되며 되돌릴 수 없습니다.`)) return;
  state.projects = state.projects.filter(p => p.id !== id);
  if(state.activeProjectId === id){
    const next = state.projects[0];
    state.activeProjectId = next.id;
    loadProjectIntoTopLevel(next);
  }
  saveState();
  rebuildTargetSet();
  toast('info','프로젝트를 삭제했습니다.');
  render();
}
let currentTab = localStorage.getItem('bodyno_last_tab') || (state.worker ? 'capture' : 'setup');
let selectedCode = state.carCodes.length ? state.carCodes[0] : null;
let selectedDevice = state.devices.length ? state.devices[0] : null;
let digits = '';
let submitting = false;
let addingProject = false;
let searchMode = false;
let searchResult = null;
let issueSelectedCode = null;
let issueDigits = '';
let issueType = '';
let issueDetailText = '';
let issueSubmitting = false;
let issueSearch = '';
let selectedIssueId = null;
let resolutionText = '';
let resolvingSubmitting = false;
let syncing = false;
let statusSearch = '';
let statusFilter = 'all'; // 'all' | 'in' | 'out'
let colFilterWorker = '';
let colFilterDevice = '';
let colFilterCode = '';
let colFilterDate = '';
let pendingSearch = '';
let pendingFilterSOff = '';
let pendingFilterStatus = '';
let pendingFilterPlant = '';
let pendingFilterLocation = '';
let pendingFilterSold = '';
let aggByWorker = false;
let aggByDevice = false;
let aggByDate = false;
let targetSet = new Set();
function targetBodyNo(t){
  return typeof t === 'string' ? t : (t && t.bodyNo) || '';
}
function findTargetMatch(bodyNo){
  const q = normBody(bodyNo);
  return state.targetList.find(t => normBody(targetBodyNo(t)) === q) || null;
}
function rebuildTargetSet(){
  targetSet = new Set(state.targetList.map(t => normBody(targetBodyNo(t))));
}
function isInTarget(bodyNo){
  if(!state.targetList.length) return null; // no target list loaded
  return targetSet.has(normBody(bodyNo));
}
let lastScan = '';

/* ---------------- Utils ---------------- */
function toast(type, msg, ms){
  const el = document.getElementById('toast');
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.display='none'; }, ms || 2200);
}
function normBody(s){ return String(s||'').toUpperCase().replace(/\s+/g,''); }
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleString('ko-KR', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false});
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
const CODE_COLOR_PALETTE = ['#1F2A3C','#2563EB','#059669','#DC2626','#7C3AED','#EA580C','#0D9488','#DB2777','#4338CA','#65A30D','#0891B2','#B45309'];
function colorForCode(code){
  if(!code) return CODE_COLOR_PALETTE[0];
  let hash = 0;
  for(let i=0;i<code.length;i++){ hash = (hash*31 + code.charCodeAt(i)) >>> 0; }
  return CODE_COLOR_PALETTE[hash % CODE_COLOR_PALETTE.length];
}
function scanIcon(size){
  const w = Math.round(size*1.5);
  return `<svg width="${w}" height="${size}" viewBox="0 0 32 20" style="vertical-align:middle;">
    <g fill="currentColor">
      <rect x="2" y="3" width="11" height="6" rx="2.5"/>
      <rect x="3" y="7" width="4" height="9.5" rx="2" transform="rotate(25 5 7)"/>
    </g>
    <line x1="13" y1="6.5" x2="17" y2="6.5" stroke="#F5A623" stroke-width="1.7" stroke-linecap="round"/>
    <g fill="currentColor">
      <rect x="18" y="1.5" width="1.1" height="16"/>
      <rect x="19.9" y="1.5" width="0.7" height="16"/>
      <rect x="21.2" y="1.5" width="1.4" height="16"/>
      <rect x="23.3" y="1.5" width="0.7" height="16"/>
      <rect x="24.5" y="1.5" width="1.1" height="16"/>
      <rect x="26.3" y="1.5" width="1.6" height="16"/>
      <rect x="28.7" y="1.5" width="0.8" height="16"/>
      <rect x="30.2" y="1.5" width="0.9" height="16"/>
    </g>
  </svg>`;
}

/* ---------------- Header ---------------- */
const APP_VERSION = 'v37';
function renderHeader(){
  document.getElementById('workerBadge').textContent = state.worker ? state.worker : '작업자 미설정';
  document.getElementById('connDot').className = 'dot' + (state.gasUrl ? ' on' : '');
  const verEl = document.getElementById('verTag');
  if(verEl) verEl.textContent = `(${APP_VERSION})`;
  const tabNames = { setup:'설정', capture:'등록', issues:'이상조치', status:'현황', pending:'미진행 현황' };
  const tabEl = document.getElementById('tabName');
  if(tabEl) tabEl.textContent = tabNames[currentTab] ? ` - ${tabNames[currentTab]}` : '';
}

/* ---------------- Setup Tab ---------------- */
function renderSetup(){
  const codesHtml = state.carCodes.map(c => `
    <div class="chip">${escapeHtml(c)}</div>
  `).join('');
  const devicesHtml = state.devices.map(d => `
    <div class="chip">${escapeHtml(d)}<button data-action="remove-device" data-device="${escapeHtml(d)}">✕</button></div>
  `).join('');

  const projectPills = state.projects.map(p => `
    <div class="chip" style="${p.id===state.activeProjectId ? '' : 'background:#fff;color:var(--primary);border:1.5px solid var(--line);'}">
      <span onclick="switchProject('${p.id}')" style="cursor:pointer;">${escapeHtml(p.name)}</span>
      ${state.projects.length > 1 ? `<button onclick="deleteProject('${p.id}')" style="${p.id===state.activeProjectId ? '' : 'background:rgba(37,96,176,.12);color:var(--primary);'}">✕</button>` : ''}
    </div>
  `).join('');

  const addProjectForm = addingProject ? `
    <div class="row" style="margin-top:10px;">
      <input type="text" id="newProjectNameInput" placeholder="예) 2공장">
      <button class="btn btn-primary" style="width:auto;padding:12px 18px;" onclick="addProject()">추가</button>
      <button class="btn btn-outline" style="width:auto;padding:12px 18px;" onclick="addingProject=false; render();">취소</button>
    </div>
  ` : `
    <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="addingProject=true; render();">+ 새 프로젝트 추가</button>
  `;

  return `
    <div class="card">
      <h3>프로젝트</h3>
      <div class="help" style="margin-bottom:10px;">여러 개의 스프레드시트(연동 URL)를 프로젝트별로 저장해두고 탭 한 번으로 전환할 수 있습니다. 작업자 이름/장비 목록은 모든 프로젝트에서 공통으로 사용됩니다.</div>
      <div class="chips">${projectPills}</div>
      ${addProjectForm}
    </div>
    <div class="card">
      <h3><span class="badge">1</span> 작업자 정보</h3>
      <div class="field">
        <label class="lbl">작업자 이름</label>
        <input type="text" id="inpWorker" placeholder="예) 홍길동" value="${escapeHtml(state.worker)}">
      </div>
    </div>

    <div class="card">
      <h3><span class="badge">2</span> 장비 등록</h3>
      <div class="field">
        <div class="row">
          <select id="selDeviceType" class="device-type-select">
            <option value="GDS">GDS</option>
            <option value="PDT">PDT</option>
          </select>
          <input type="text" id="inpDeviceNo" placeholder="예) 1, 01 모두 가능">
          <button class="btn btn-primary" onclick="addDevice()">추가</button>
        </div>
        <div class="chips" style="margin-top:10px;">${devicesHtml || ''}</div>
      </div>
    </div>

    <div class="card">
      <h3><span class="badge">3</span> 구글 스프레드시트 연동</h3>
      <div class="field">
        <label class="lbl">Apps Script 웹앱 URL</label>
        <input type="url" id="inpGasUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(state.gasUrl)}">
        <div class="help">스프레드시트의 확장 프로그램 &gt; Apps Script에서 웹 앱으로 배포한 URL을 입력하세요. (액세스 권한: 모든 사용자)</div>
      </div>

      <div class="two-col" style="margin-top:16px;">
        <div class="field">
          <label class="lbl">차종코드</label>
          <div class="chips">${codesHtml || ''}</div>
          ${!state.carCodes.length ? `<div class="help">아직 불러온 차종코드가 없습니다.</div>` : ''}
        </div>

        <div class="field">
          <label class="lbl">대상 리스트</label>
          <div class="help" style="font-weight:700;color:var(--ink);">${state.targetList.length ? `${state.targetList.length}건` : '아직 불러온 대상 리스트가 없습니다.'}</div>
        </div>
      </div>

      <div class="help" style="margin-top:14px;">${state.lastSync ? `마지막 동기화: ${fmtTime(state.lastSync)}` : '동기화 대기 중'}</div>
      <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="syncStatus()">${syncing ? '동기화 중...' : '🔄 지금 동기화'}</button>
    </div>

    <div class="card">
      <h3><span class="badge">4</span> Body No 입력 방식</h3>
      <div class="mode-row">
        <button class="mode-btn${state.inputMode!=='scan' ? ' selected' : ''}" onclick="setInputMode('manual')">🔢<br>수동입력 (터치)</button>
        <button class="mode-btn${state.inputMode==='scan' ? ' selected' : ''}" onclick="setInputMode('scan')">${scanIcon(20)}<br>바코드 스캔 (BT)</button>
      </div>
      <div class="help">바코드 스캔 선택 시, 취득 화면이 스캔 대기 화면으로 바뀌고 블루투스로 연결된 스캐너가 인식한 값이 자동으로 저장됩니다. 스캐너는 폰 설정의 블루투스 메뉴에서 먼저 페어링해주세요.</div>
    </div>

    <button class="btn btn-primary btn-block" style="padding:16px;font-size:16px;margin-bottom:14px;" onclick="saveSetup()">설정 저장</button>

    <div class="card" style="border-color:var(--danger);">
      <h3 style="color:var(--danger);">위험 구역</h3>
      <div class="help" style="margin-bottom:10px;">아래 버튼을 누르면 이 기기에 저장된 모든 데이터(작업자, 장비, <b>모든 프로젝트</b>의 연동 설정·차종코드·대상 리스트·취득 기록·이상조치)가 삭제됩니다.</div>
      <button class="btn btn-danger-outline btn-block" onclick="openResetModal()">전체 초기화</button>
    </div>
  `;
}

function setInputMode(m){
  if(state.inputMode === m) return;
  state.inputMode = m;
  saveState();
  toast('info', m === 'scan' ? '바코드 스캔 모드로 변경되었습니다.' : '수동입력 모드로 변경되었습니다.');
  render();
}
function saveSetup(){
  const worker = document.getElementById('inpWorker').value.trim();
  const gasUrl = document.getElementById('inpGasUrl').value.trim();
  if(!worker){ toast('danger','작업자 이름을 입력해주세요.'); return; }
  state.worker = worker;
  state.gasUrl = gasUrl;
  saveState();
  toast('success','설정이 저장되었습니다.');
  render();
}

/* ---------------- Capture Tab ---------------- */
function renderCapture(){
  if(!state.worker){
    return `<div class="empty"><div class="big">⚙</div><p>설정 화면에서<br><b>작업자 이름</b>을 먼저 입력해주세요.</p>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="goTab('setup')">설정으로 이동</button></div>`;
  }
  if(!state.carCodes.length){
    return `<div class="empty"><div class="big">🔤</div><p>설정 화면에서<br><b>차종코드</b>를 동기화해주세요.</p>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="goTab('setup')">설정으로 이동</button></div>`;
  }
  if(!state.devices.length){
    return `<div class="empty"><div class="big">📟</div><p>설정 화면에서<br><b>장비</b>를 등록해주세요.</p>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="goTab('setup')">설정으로 이동</button></div>`;
  }
  const stats = renderCaptureStats();
  const body = state.inputMode === 'scan' ? renderCaptureScan() : renderCaptureManual();
  return stats + body;
}

function getWorkerStats(){
  const records = state.allRecordsCache !== null ? state.allRecordsCache : state.myRecords;
  const mine = records.filter(r => r.worker === state.worker);
  const todayStr = new Date().toDateString();
  const today = mine.filter(r => new Date(r.ts || r.timestamp).toDateString() === todayStr).length;
  return { today, total: mine.length };
}

function renderCaptureStats(){
  const { today, total } = getWorkerStats();
  return `
    <div class="capture-stats">
      <div class="stat-box">
        <div class="stat-lbl">오늘 등록</div>
        <div class="stat-num">${today}</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">누적 등록</div>
        <div class="stat-num">${total}</div>
      </div>
    </div>
  `;
}

function renderCaptureManual(){
  if(!selectedCode) selectedCode = state.carCodes[0];
  if(!selectedDevice) selectedDevice = state.devices[0];

  const deviceRow = state.devices.length > 1 ? `
    <div class="card" style="padding:10px 16px;margin-bottom:10px;">
      <div class="code-pill-row">
        <span class="inline-label">장비</span>
        ${state.devices.map(d=>`<button class="code-pill${d===selectedDevice?' selected':''}" data-action="select-device" data-device="${escapeHtml(d)}">${escapeHtml(d)}</button>`).join('')}
      </div>
    </div>
  ` : '';

  const boxes = [];
  for(let i=0;i<6;i++){
    const d = digits[i];
    let cls = 'digit-box';
    if(d !== undefined) cls += ' filled';
    else if(i === digits.length) cls += ' active';
    boxes.push(`<div class="${cls}">${d !== undefined ? d : ''}</div>`);
  }

  return `
    ${renderSearchRow()}
    ${deviceRow}
    <div class="capture-head">
      <button class="code-tag" data-action="toggle-code" style="background:${colorForCode(selectedCode)};"><span class="code-tag-text">${escapeHtml(selectedCode)}</span></button>
      ${boxes.join('')}
    </div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-action="digit" data-digit="${n}">${n}</button>`).join('')}

    </div>

      ${submitting ? '저장 중...' : '등록'}
    </button>

}

function renderCaptureScan(){
  if(!selectedDevice) selectedDevice = state.devices[0];
  const recent = state.myRecords.slice(-5).reverse();
  const deviceRow = state.devices.length > 1 ? `

        <span class="inline-label">장비</span>
        ${state.devices.map(d=>`<button class="code-pill${d===selectedDevice?' selected':''}" data-action="select-device" data-device="${escapeHtml(d)}">${escapeHtml(d)}</button>`).join('')}

  return `

      <h3 style="justify-content:center;margin-top:12px;">${submitting ? '저장 중...' : '바코드 스캔 대기 중'}</h3>
      <div class="help">${searchMode ? '스캔 시 대상이면 자동 등록되고, 대상 외이면 등록 버튼을 눌러야 저장됩니다.' : '블루투스로 연결된 스캐너에서 Body No 바코드를 스캔하면 자동으로 저장됩니다.'}</div>
      <input id="scanInput" type="text" inputmode="none" autocomplete="off" autocapitalize="off" spellcheck="false"
        style="position:absolute;width:1px;height:1px;opacity:0;border:none;padding:0;">
      <div style="margin-top:20px;font-family:'Roboto Mono',monospace;font-weight:700;font-size:24px;letter-spacing:2px;color:var(--primary);">
        ${lastScan ? escapeHtml(lastScan) : '대기 중'}
      </div>
    </div>
    ${searchMode && digits.length === 6 ? `
    <button class="btn btn-primary btn-block submit-btn" data-action="submit" ${submitting ? 'disabled' : ''}>${submitting ? '저장 중...' : '등록'}</button>
    ` : ''}
    ${recent.length ? `
    <div class="card">
      <h3>최근 스캔 기록</h3>
      ${recent.map(r=>`

          <div class="rec-meta">${fmtTime(r.ts)}</div>
        </div>
      `).join('')}
    </div>` : ''}
  `;
}
function focusScanInput(){
  const el = document.getElementById('scanInput');
  if(el) el.focus();
}
function normalizeScan(raw){
  const clean = String(raw||'').replace(/[\r\n\t]/g,'').toUpperCase().trim();
  // code is 2-4 alphanumeric chars, optionally followed by one separator, then exactly 6 digits.
  // Anchored match + greedy {2,4} means the split is unambiguous: total length determines code length.
  const m = clean.match(/^([A-Z0-9]{2,4})[\s-]?(\d{6})$/);
  if(!m) return null;
  return { code: m[1], number: m[2] };
}
function handleScanValue(raw){
  const trimmed = String(raw||'').trim();
  if(!trimmed || submitting) return;
  const parsed = normalizeScan(trimmed);
  if(!parsed){
    lastScan = trimmed;
    toast('danger', `인식할 수 없는 바코드 형식입니다: ${trimmed}`);
    render();
    return;
  }
  if(!state.carCodes.includes(parsed.code)){
    lastScan = parsed.code + ' ' + parsed.number;
    toast('danger', `등록되지 않은 차종코드입니다: ${parsed.code}`);
    render();
    return;
  }
  selectedCode = parsed.code;
  digits = parsed.number;
  lastScan = selectedCode + ' ' + digits;
  refreshSearchPreview();

  if(searchMode){
    const bodyNo = selectedCode + ' ' + digits;
    const match = findTargetMatch(bodyNo);
    if(match){
      submitBodyNo(); // 대상 → 자동 등록
    } else {
      render(); // 대상 외 → 자동 등록하지 않고, 등록 버튼을 눌러야 함
    }
  } else {
    submitBodyNo(); // 대상 검색 비활성 → 항상 자동 등록
  }
}
function selectCode(c){ if(c===selectedCode) return; selectedCode = c; digits=''; refreshSearchPreview(); render(); }
function toggleCode(){
  if(!state.carCodes.length) return;
  const idx = state.carCodes.indexOf(selectedCode);
  const next = state.carCodes[(idx + 1) % state.carCodes.length];
  selectCode(next);
}
function selectDevice(d){ if(d===selectedDevice) return; selectedDevice = d; render(); }
function addDevice(){
  const typeSel = document.getElementById('selDeviceType');
  const noInp = document.getElementById('inpDeviceNo');
  const type = typeSel.value;
  let no = noInp.value.trim();
  if(!no){ toast('danger','장비 번호를 입력해주세요.'); return; }
  if(/^\d+$/.test(no)) no = no.padStart(2, '0'); // 숫자만 입력 시 2자리로 통일 (1 → 01)
  const v = `${type}-${no}`;
  if(state.devices.includes(v)){ toast('danger','이미 등록된 장비입니다.'); return; }
  state.devices.push(v);
  if(!selectedDevice) selectedDevice = v;
  saveState();
  noInp.value = '';
  render();
}
function removeDevice(d){
  state.devices = state.devices.filter(x => x !== d);
  if(selectedDevice === d){
    selectedDevice = state.devices.length ? state.devices[0] : null;
  }
  saveState();
  render();
}
function refreshSearchPreview(){
  if(!searchMode){ searchResult = null; return; }
  if(digits.length === 6 && selectedCode){
    const bodyNo = selectedCode + ' ' + digits;
    const hasTarget = state.targetList.length > 0;
    const match = hasTarget ? findTargetMatch(bodyNo) : null;
    searchResult = { bodyNo, hasTarget, matched: !!match, meta: match || {} };
  } else {
    searchResult = null;
  }
}
function pressDigit(n){
  if(digits.length>=6 || submitting) return;
  digits += String(n);
  refreshSearchPreview();
  render();
}
function backspace(){
  if(submitting) return;
  digits = digits.slice(0,-1);
  refreshSearchPreview();
  render();
}
function clearDigits(){
  if(submitting) return;
  digits = '';
  refreshSearchPreview();
  render();
}

function toggleSearchMode(val){
  searchMode = val;
  refreshSearchPreview();
  render();
}
function renderSearchRow(){
  let badge;
  if(!searchResult){
    badge = `<div class="search-badge empty">6자리 입력 시 표시</div>`;
  } else if(!searchResult.hasTarget){
    badge = `<div class="search-badge empty no-target-badge">대상 리스트<br>미설정</div>`;
  } else {
    badge = `<div class="search-badge ${searchResult.matched ? 'found' : 'notfound'}">
      <div class="search-badge-body">${escapeHtml(searchResult.bodyNo)}</div>
      <div class="search-badge-tag">${searchResult.matched ? '대상' : '대상 외'}</div>
    </div>`;
  }
  return `
    <div class="search-row">
      <label class="search-toggle">
        <input type="checkbox" ${searchMode?'checked':''} onchange="toggleSearchMode(this.checked)">
        <span>대상 검색</span>
      </label>
      ${searchMode ? badge : ''}
    </div>
  `;
}
function submitBodyNo(){
  if(digits.length !== 6 || submitting) return;
  const bodyNo = selectedCode + ' ' + digits;

  const dupLocal = state.myRecords.some(r => normBody(r.bodyNo) === normBody(bodyNo));
  if(dupLocal){
    toast('danger', `이미 등록된 Body No 입니다: ${bodyNo}`);
    return;
  }
  if(!state.gasUrl){
    toast('danger','설정 화면에서 구글 스프레드시트 연동 URL을 먼저 입력해주세요.');
    return;
  }

  submitting = true;
  render();

  const payload = { worker: state.worker, device: selectedDevice || '', number: digits, bodyNo: bodyNo, timestamp: new Date().toISOString() };

  fetch(state.gasUrl, { method:'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success'){
        const rec = { worker: state.worker, device: payload.device, number: digits, bodyNo: bodyNo, ts: Date.now(), timestamp: payload.timestamp };
        state.myRecords.push(rec);
        if(state.allRecordsCache !== null) state.allRecordsCache.push(rec);
        saveState();
        const inTarget = isInTarget(bodyNo);
        if(inTarget === false){
          toast('info', `⚠ 대상 외 등록: ${bodyNo} (대상 리스트에 없음)`, 3200);
        } else {
          toast('success', `저장 완료: ${bodyNo}`);
        }
        digits = '';
        searchResult = null;
      } else if(data.result === 'duplicate'){
        toast('danger', data.message || `이미 등록된 Body No 입니다: ${bodyNo}`);
      } else {
        toast('danger', data.message || '저장 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    })
    .catch(()=>{
      toast('danger','네트워크 오류로 저장하지 못했습니다. 다시 시도해주세요.');
    })
    .finally(()=>{
      submitting = false;
      render();
    });
}

/* ---------------- Status Tab ---------------- */
function unresolvedIssueBodySet(){
  return new Set(state.issues.filter(i => !i.resolved).map(i => normBody(i.bodyNo)));
}

function getStatusData(){
  const records = state.allRecordsCache !== null ? state.allRecordsCache : state.myRecords;
  const hasTarget = state.targetList.length > 0;
  const total = state.targetList.length;
  const inTargetRecords = hasTarget ? records.filter(r => isInTarget(r.bodyNo)) : [];
  const outTargetRecords = hasTarget ? records.filter(r => !isInTarget(r.bodyNo)) : [];

  // 완료 수량(대상등록/대상 외 등록/진행율)은 미조치 이상이 걸린 Body No는 제외하고 집계.
  // 조치완료되면 다시 포함됨. 대상/대상 외 분류 자체(태그/리스트/필터)는 영향 없음.
  const unresolvedSet = unresolvedIssueBodySet();
  const countableRecords = records.filter(r => !unresolvedSet.has(normBody(r.bodyNo)));
  const inTargetCountable = hasTarget ? countableRecords.filter(r => isInTarget(r.bodyNo)) : [];
  const outTargetCountable = hasTarget ? countableRecords.filter(r => !isInTarget(r.bodyNo)) : [];
  const completed = hasTarget ? inTargetCountable.length : countableRecords.length;
  const pct = hasTarget ? Math.min(100, Math.round(completed/total*100)) : null;

  let base = records;
  if(hasTarget && statusFilter === 'in') base = inTargetRecords;
  else if(hasTarget && statusFilter === 'out') base = outTargetRecords;

  const workerOptions = [...new Set(records.map(r=>r.worker).filter(Boolean))].sort();
  const deviceOptions = [...new Set(records.map(r=>r.device).filter(Boolean))].sort();
  const dateOptions = [...new Set(records.map(r=>new Date(r.ts||r.timestamp).toLocaleDateString('ko-KR')))]
    .sort((a,b)=> new Date(b) - new Date(a));
  const codeOptions = state.carCodes.length ? state.carCodes : [...new Set(records.map(r=>(r.bodyNo||'').split(' ')[0]).filter(Boolean))];

  const filtered = base.filter(r=>{
    if(colFilterWorker && r.worker !== colFilterWorker) return false;
    if(colFilterDevice && r.device !== colFilterDevice) return false;
    if(colFilterCode && !normBody(r.bodyNo).startsWith(normBody(colFilterCode))) return false;
    if(colFilterDate && new Date(r.ts||r.timestamp).toLocaleDateString('ko-KR') !== colFilterDate) return false;
    if(!statusSearch) return true;
    const q = statusSearch.toUpperCase().replace(/\s+/g,'');
    return normBody(r.bodyNo).includes(q)
      || String(r.worker||'').toUpperCase().includes(q)
      || String(r.device||'').toUpperCase().replace(/\s+/g,'').includes(q);
  }).slice().sort((a,b)=> new Date(b.ts||b.timestamp) - new Date(a.ts||a.timestamp));

  return { records, hasTarget, total, inTargetRecords, outTargetRecords, inTargetCountable, outTargetCountable, completed, pct, filtered, workerOptions, deviceOptions, dateOptions, codeOptions };
}

function renderRecRow(r, hasTarget){
  const inT = hasTarget ? isInTarget(r.bodyNo) : null;
  const tag = hasTarget ? `<span class="tag ${inT ? 'tag-in' : 'tag-out'}">${inT ? '대상' : '대상 외'}</span>` : '';
  return `
    <tr>
      <td>${tag}</td>
      <td class="mono-cell">${escapeHtml(r.bodyNo)}</td>
      <td>${escapeHtml(r.worker||'')}</td>
      <td>${escapeHtml(r.device||'')}</td>
      <td>${fmtTime(r.ts||r.timestamp)}</td>
    </tr>
  `;
}

function renderStatusList(filtered, hasTarget){
  const { workerOptions, deviceOptions, dateOptions, codeOptions } = getStatusData();
  const rows = filtered.length
    ? filtered.map(r => renderRecRow(r, hasTarget)).join('')
    : `<tr><td colspan="5" style="text-align:center;padding:24px 10px;color:var(--muted);">표시할 기록이 없습니다.</td></tr>`;

  const targetHeader = hasTarget ? `
    <th>
      <select class="th-filter" onchange="setStatusFilter(this.value)">
        <option value="all" ${statusFilter==='all'?'selected':''}>대상: 전체</option>
        <option value="in" ${statusFilter==='in'?'selected':''}>대상만</option>
        <option value="out" ${statusFilter==='out'?'selected':''}>대상 외만</option>
      </select>
    </th>
  ` : `<th>대상</th>`;

  const codeHeader = codeOptions.length ? `
    <th>
      <select class="th-filter" onchange="setColFilter('code', this.value)">
        <option value="" ${!colFilterCode?'selected':''}>Body No: 전체</option>
        ${codeOptions.map(c=>`<option value="${escapeHtml(c)}" ${colFilterCode===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}
      </select>
    </th>
  ` : `<th>Body No</th>`;

  const workerHeader = workerOptions.length ? `
    <th>
      <select class="th-filter" onchange="setColFilter('worker', this.value)">
        <option value="" ${!colFilterWorker?'selected':''}>작업자: 전체</option>
        ${workerOptions.map(w=>`<option value="${escapeHtml(w)}" ${colFilterWorker===w?'selected':''}>${escapeHtml(w)}</option>`).join('')}
      </select>
    </th>
  ` : `<th>작업자</th>`;

  const deviceHeader = deviceOptions.length ? `
    <th>
      <select class="th-filter" onchange="setColFilter('device', this.value)">
        <option value="" ${!colFilterDevice?'selected':''}>장비: 전체</option>
        ${deviceOptions.map(d=>`<option value="${escapeHtml(d)}" ${colFilterDevice===d?'selected':''}>${escapeHtml(d)}</option>`).join('')}
      </select>
    </th>
  ` : `<th>장비</th>`;

  const dateHeader = dateOptions.length ? `
    <th>
      <select class="th-filter" onchange="setColFilter('date', this.value)">
        <option value="" ${!colFilterDate?'selected':''}>등록시간: 전체</option>
        ${dateOptions.map(d=>`<option value="${escapeHtml(d)}" ${colFilterDate===d?'selected':''}>${escapeHtml(d)}</option>`).join('')}
      </select>
    </th>
  ` : `<th>등록시간</th>`;

  return `
    <div class="agg-table-wrap">
      <table class="agg-table">
        <thead>
          <tr>${targetHeader}${codeHeader}${workerHeader}${deviceHeader}${dateHeader}</tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function formatAggDate(d){
  const dt = new Date(d);
  const yy = String(dt.getFullYear()).slice(-2);
  return `'${yy}. ${dt.getMonth()+1}/${dt.getDate()}`;
}
function renderAggBody(){
  if(!aggByWorker && !aggByDevice && !aggByDate){
    return `<div class="help">기준을 하나 이상 선택하면 집계표가 나타납니다.</div>`;
  }
  const { filtered, hasTarget } = getStatusData();
  const groups = {};

  function keyPartsFor(dateStr, worker, device){
    const parts = [];
    if(aggByDate) parts.push(dateStr);
    if(aggByWorker) parts.push(worker || '(미상)');
    if(aggByDevice) parts.push(device || '(미지정)');
    return parts;
  }
  function getGroup(parts){
    const key = parts.join('|||');
    if(!groups[key]) groups[key] = { parts, target:0, outTarget:0, issue:0 };
    return groups[key];
  }

  filtered.forEach(r=>{
    const dateStr = formatAggDate(r.ts||r.timestamp);
    const g = getGroup(keyPartsFor(dateStr, r.worker, r.device));
    if(hasTarget){
      if(isInTarget(r.bodyNo)) g.target++; else g.outTarget++;
    } else {
      g.target++;
    }
  });
  state.issues.filter(i=>!i.resolved).forEach(i=>{
    const dateStr = formatAggDate(i.timestamp);
    const g = getGroup(keyPartsFor(dateStr, i.worker, aggByDevice ? '' : undefined));
    g.issue++;
  });

  const rows = Object.values(groups).sort((a,b)=> (b.target+b.outTarget) - (a.target+a.outTarget));

  const headers = [];
  if(aggByDate) headers.push('날짜');
  if(aggByWorker) headers.push('작업자');
  if(aggByDevice) headers.push('장비');
  if(hasTarget){ headers.push('대상'); headers.push('대상 외'); } else { headers.push('등록'); }
  headers.push('이상');

  if(!rows.length){
    return `<div class="empty" style="padding:20px 10px;"><p>집계할 데이터가 없습니다.</p></div>`;
  }

  const totalTarget = rows.reduce((s,r)=>s+r.target,0);
  const totalOutTarget = rows.reduce((s,r)=>s+r.outTarget,0);
  const totalIssue = rows.reduce((s,r)=>s+r.issue,0);
  const dimColCount = headers.length - (hasTarget ? 3 : 2);

  return `
    <div class="agg-table-wrap">
      <table class="agg-table">
        <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>${r.parts.map(p=>`<td>${escapeHtml(p)}</td>`).join('')}${hasTarget ? `<td class="agg-count">${r.target}</td><td class="agg-count">${r.outTarget}</td>` : `<td class="agg-count">${r.target}</td>`}<td class="agg-count">${r.issue}</td></tr>`).join('')}
        </tbody>
        <tfoot>
          <tr><td colspan="${dimColCount}">합계</td>${hasTarget ? `<td class="agg-count">${totalTarget}</td><td class="agg-count">${totalOutTarget}</td>` : `<td class="agg-count">${totalTarget}</td>`}<td class="agg-count">${totalIssue}</td></tr>
        </tfoot>
      </table>
    </div>
  `;
}
function toggleAgg(dim){
  if(dim === 'worker') aggByWorker = !aggByWorker;
  else if(dim === 'device') aggByDevice = !aggByDevice;
  else if(dim === 'date') aggByDate = !aggByDate;
  render();
}

function onStatusSearchInput(val){
  statusSearch = val;
  const { hasTarget, filtered } = getStatusData();
  const countEl = document.getElementById('statusListCount');
  const listEl = document.getElementById('statusListItems');
  if(countEl) countEl.textContent = filtered.length;
  if(listEl) listEl.innerHTML = renderStatusList(filtered, hasTarget);
  const aggEl = document.getElementById('aggTableContainer');
  if(aggEl) aggEl.innerHTML = renderAggBody();
}

function renderStatus(){
  const { hasTarget, total, inTargetCountable, outTargetCountable, completed, pct, filtered } = getStatusData();
  const syncLabel = state.lastSync ? `마지막 동기화: ${fmtTime(state.lastSync)}` : (state.gasUrl ? '아직 동기화되지 않음' : '연동 URL 미설정 — 이 기기의 기록만 표시됩니다');
  const unresolvedIssues = state.issues.filter(i => !i.resolved).length;

  const miniStats = hasTarget ? `
    <div class="mini-stats-row">
      <div class="mini-stat mini-in"><div class="mini-stat-num">${inTargetCountable.length}</div><div class="mini-stat-lbl">대상등록</div></div>
      <div class="mini-stat mini-out"><div class="mini-stat-num">${outTargetCountable.length}</div><div class="mini-stat-lbl">대상 외 등록</div></div>
      <div class="mini-stat mini-issue"><div class="mini-stat-num">${unresolvedIssues}</div><div class="mini-stat-lbl">이상</div></div>
    </div>
  ` : `
    <div class="mini-stats-row">
      <div class="mini-stat mini-in"><div class="mini-stat-num">${completed}</div><div class="mini-stat-lbl">전체 등록</div></div>
      <div class="mini-stat mini-issue"><div class="mini-stat-num">${unresolvedIssues}</div><div class="mini-stat-lbl">이상</div></div>
    </div>
  `;

  return `
    <div class="card">
      <div class="stat-head">
        <h3 style="margin:0;">전체 진행현황</h3>
        <button class="link-btn" onclick="syncStatus()">${syncing ? '동기화 중...' : '🔄 새로고침'}</button>
      </div>
      <div class="sync" style="margin-bottom:10px;">${syncLabel}</div>
      <div class="progress-num">${completed}${hasTarget ? `<span> / ${total}건 (${pct}%)</span>` : `<span>건 완료 (목표 미설정)</span>`}</div>
      ${hasTarget ? `<div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>` : ''}
      ${miniStats}
    </div>

    <div class="card">
      <h3>집계 보기</h3>
      <div class="agg-checks">
        <label><input type="checkbox" ${aggByDate?'checked':''} onchange="toggleAgg('date')"> 일별</label>
        <label><input type="checkbox" ${aggByWorker?'checked':''} onchange="toggleAgg('worker')"> 작업자</label>
        <label><input type="checkbox" ${aggByDevice?'checked':''} onchange="toggleAgg('device')"> 장비</label>
      </div>
      <div id="aggTableContainer">${renderAggBody()}</div>

/* ---------------- Pending (미진행) Tab ---------------- */
function dateOnly(v){
  if(!v) return '';
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString('ko-KR');
}
function pendingMeta(t){ return (typeof t === 'object' && t) ? t : {}; }

function getPendingData(){
  const hasTarget = state.targetList.length > 0;
  if(!hasTarget) return { hasTarget, total: 0, pending: [], registeredCount: 0, filtered: [], sOffOptions: [], statusOptions: [], plantOptions: [], locationOptions: [], soldOptions: [] };
  const records = state.allRecordsCache !== null ? state.allRecordsCache : state.myRecords;
  const unresolvedSet = unresolvedIssueBodySet();
  const registeredSet = new Set(records.filter(r => !unresolvedSet.has(normBody(r.bodyNo))).map(r => normBody(r.bodyNo)));
  const pending = state.targetList.filter(t => !registeredSet.has(normBody(targetBodyNo(t))));

  const sOffOptions = [...new Set(pending.map(t=>dateOnly(pendingMeta(t).sOff)).filter(Boolean))]
    .sort((a,b)=> new Date(b) - new Date(a));
  const statusOptions = [...new Set(pending.map(t=>pendingMeta(t).vehicleStatus).filter(Boolean))].sort();
  const plantOptions = [...new Set(pending.map(t=>pendingMeta(t).shippingPlant).filter(Boolean))].sort();
  const locationOptions = [...new Set(pending.map(t=>pendingMeta(t).location).filter(Boolean))].sort();
  const soldOptions = [...new Set(pending.map(t=>pendingMeta(t).soldStatus).filter(Boolean))].sort();

  const filtered = filterPending(pending);

  return { hasTarget, total: state.targetList.length, pending, registeredCount: state.targetList.length - pending.length, filtered, sOffOptions, statusOptions, plantOptions, locationOptions, soldOptions };
}
function filterPending(pending){
  return pending.filter(t=>{
    const meta = pendingMeta(t);
    if(pendingFilterSOff && dateOnly(meta.sOff) !== pendingFilterSOff) return false;
    if(pendingFilterStatus && meta.vehicleStatus !== pendingFilterStatus) return false;
    if(pendingFilterPlant && meta.shippingPlant !== pendingFilterPlant) return false;
    if(pendingFilterLocation && meta.location !== pendingFilterLocation) return false;
    if(pendingFilterSold && meta.soldStatus !== pendingFilterSold) return false;
    if(!pendingSearch) return true;
    const q = pendingSearch.toUpperCase().replace(/\s+/g,'');
    if(normBody(targetBodyNo(t)).includes(q)) return true;
    return [meta.sOff, meta.vehicleStatus, meta.shippingPlant, meta.location, meta.soldStatus]
      .some(v => String(v||'').toUpperCase().replace(/\s+/g,'').includes(q));
  });
}
function renderPendingRow(t){
  const bodyNo = targetBodyNo(t);
  const meta = pendingMeta(t);
  return `
    <tr>
      <td class="mono-cell">${escapeHtml(bodyNo)}</td>
      <td>${escapeHtml(dateOnly(meta.sOff))}</td>
      <td>${escapeHtml(meta.vehicleStatus||'')}</td>
      <td>${escapeHtml(meta.shippingPlant||'')}</td>
      <td>${escapeHtml(meta.location||'')}</td>
      <td>${escapeHtml(meta.soldStatus||'')}</td>
    </tr>
  `;
}
function pendingFilterHeader(label, type, current, options){
  if(!options.length) return `<th>${label}</th>`;
  return `
    <th>
      <select class="th-filter" onchange="setPendingColFilter('${type}', this.value)">
        <option value="" ${!current?'selected':''}>${label}: 전체</option>
        ${options.map(o=>`<option value="${escapeHtml(o)}" ${current===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
      </select>
    </th>
  `;
}
function renderPendingList(filtered, opts){
  const rows = filtered.length
    ? filtered.map(t => renderPendingRow(t)).join('')
    : `<tr><td colspan="6" style="text-align:center;padding:24px 10px;color:var(--muted);">미진행 항목이 없습니다. 🎉</td></tr>`;
  const headers = [
    `<th>Body No</th>`,
    pendingFilterHeader('S/Off', 'sOff', pendingFilterSOff, opts.sOffOptions),
    pendingFilterHeader('차량상태', 'status', pendingFilterStatus, opts.statusOptions),
    pendingFilterHeader('출하장', 'plant', pendingFilterPlant, opts.plantOptions),
    pendingFilterHeader('로케이션', 'location', pendingFilterLocation, opts.locationOptions),
    pendingFilterHeader('판매여부', 'sold', pendingFilterSold, opts.soldOptions)
  ].join('');
  return `
    <div class="agg-table-wrap">
      <table class="agg-table">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
function setPendingColFilter(type, value){
  if(type === 'sOff') pendingFilterSOff = value;
  else if(type === 'status') pendingFilterStatus = value;
  else if(type === 'plant') pendingFilterPlant = value;
  else if(type === 'location') pendingFilterLocation = value;
  else if(type === 'sold') pendingFilterSold = value;
  render();
}
function onPendingSearchInput(val){
  pendingSearch = val;
  const data = getPendingData();

      <input type="text" class="search-box" placeholder="Body No 검색" value="${escapeHtml(pendingSearch)}" oninput="onPendingSearchInput(this.value)" style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;">
      <div id="pendingListItems">${renderPendingList(filtered, data)}</div>

function genId(){

}
function renderIssues(){

function focusIssueScanInput(){

function handleIssueScanValue(raw){
  const trimmed = String(raw||'').trim();
  if(!trimmed) return;
  const parsed = normalizeScan(trimmed);
  if(!parsed){
    toast('danger', `인식할 수 없는 바코드 형식입니다: ${trimmed}`);
    return;
  }
  if(!state.carCodes.includes(parsed.code)){
    toast('danger', `등록되지 않은 차종코드입니다: ${parsed.code}`);
    return;
  }
  issueSelectedCode = parsed.code;
  issueDigits = parsed.number;
  render();
}

function issuePressDigit(n){
  if(issueDigits.length>=6 || issueSubmitting) return;
  issueDigits += String(n);
  render();
}
function issueBackspace(){
  if(issueSubmitting) return;
  issueDigits = issueDigits.slice(0,-1);
  render();
}
function issueClearDigits(){
  if(issueSubmitting) return;
  issueDigits = '';
  render();
}
function selectIssueCode(c){
  if(c===issueSelectedCode) return;
  issueSelectedCode = c;
  issueDigits = '';
  render();
}
function toggleIssueCode(){
  if(!state.carCodes.length) return;
  const idx = state.carCodes.indexOf(issueSelectedCode);
  const next = state.carCodes[(idx + 1) % state.carCodes.length];
  selectIssueCode(next);
}
function setIssueType(t){
  issueType = t;
  render();
}
function submitIssue(){
  if(issueDigits.length !== 6 || !issueSelectedCode || !issueType || issueSubmitting) return;
  if(!state.gasUrl){ toast('danger','설정 화면에서 구글 스프레드시트 연동 URL을 먼저 입력해주세요.'); return; }
  const bodyNo = issueSelectedCode + ' ' + issueDigits;
  const id = genId();
  issueSubmitting = true;
  render();

  const payload = { type:'issueCreate', id, worker: state.worker, bodyNo, issueType, detail: issueDetailText, timestamp: new Date().toISOString() };
  fetch(state.gasUrl, { method:'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success'){
        state.issues.push({ id, timestamp: payload.timestamp, worker: state.worker, bodyNo, issueType, detail: issueDetailText, resolved: false, resolutionDetail:'', resolvedAt:'', resolvedBy:'' });
        saveState();
        toast('success', `이상 등록 완료: ${bodyNo} (${issueType})`);
        issueDigits = '';
        issueType = '';
        issueDetailText = '';
      } else {
        toast('danger', data.message || '이상 등록 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    })
    .catch(()=>{
      toast('danger','네트워크 오류로 등록하지 못했습니다. 다시 시도해주세요.');
    })
    .finally(()=>{
      issueSubmitting = false;
      render();
    });
}

function selectIssueForResolve(id){

}
function cancelResolution(){

function renderIssueResolvePanel(){

  const issue = state.issues.find(i => i.id === selectedIssueId);

  if(!selectedDevice) selectedDevice = state.devices[0];
  const deviceRow = state.devices.length > 1 ? `
    <div class="field">
      <div class="code-pill-row">
        <span class="inline-label">장비</span>

  return `

      <div class="field">
        <textarea id="resolutionInput" class="ta" rows="2" placeholder="조치한 내용을 입력하세요">${escapeHtml(resolutionText)}</textarea>
      </div>
      ${deviceRow}
      <div class="row">
        <button class="btn btn-outline btn-block" onclick="cancelResolution()" style="font-size:17px;padding:14px 16px;">취소</button>
        <button class="btn btn-primary btn-block" data-action="issue-resolve-submit" style="font-size:17px;padding:14px 16px;" ${resolvingSubmitting ? 'disabled' : ''}>${resolvingSubmitting ? '처리 중...' : '조치완료'}</button>
      </div>
    </div>
  `;
}
function submitResolution(){
  if(!selectedIssueId || resolvingSubmitting) return;
  if(!resolutionText.trim()){ toast('danger','조치내용을 입력해주세요.'); return; }
  if(!state.gasUrl){ toast('danger','설정 화면에서 구글 스프레드시트 연동 URL을 먼저 입력해주세요.'); return; }
  resolvingSubmitting = true;
  render();

  const payload = { type:'issueResolve', id: selectedIssueId, resolutionDetail: resolutionText, resolvedBy: state.worker, resolvedDevice: selectedDevice || '', resolvedAt: new Date().toISOString() };
  fetch(state.gasUrl, { method:'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success'){
        const issue = state.issues.find(i => i.id === selectedIssueId);
        if(issue){
          issue.resolved = true;
          issue.resolutionDetail = payload.resolutionDetail;
          issue.resolvedAt = payload.resolvedAt;
          issue.resolvedBy = payload.resolvedBy;
          issue.resolvedDevice = payload.resolvedDevice;
        }
        saveState();
        toast('success','조치 완료 처리되었습니다.');
        selectedIssueId = null;
        resolutionText = '';
      } else {
        toast('danger', data.message || '처리 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    })
    .catch(()=>{
      toast('danger','네트워크 오류로 처리하지 못했습니다. 다시 시도해주세요.');
    })
    .finally(()=>{
      resolvingSubmitting = false;
      render();
    });
}

function syncStatus(){
  if(!state.gasUrl){ toast('danger','설정 화면에서 연동 URL을 먼저 입력해주세요.'); return; }
  if(syncing) return;
  syncing = true;
  render();
  fetch(state.gasUrl + '?action=list')
    .then(res=>{
      if(!res.ok) throw new Error(`서버 응답 오류 (HTTP ${res.status})`);
      return res.text();
    })
    .then(text=>{
      let data;
      try{
        data = JSON.parse(text);
      }catch(e){
        // Apps Script often returns an HTML login/error page instead of JSON when
        // the deployment isn't set to "Anyone" access, or wasn't redeployed after edits.
        throw new Error('응답이 JSON이 아닙니다. 배포 권한(모든 사용자) 또는 재배포 여부를 확인해주세요.');
      }
      if(data && data.result === 'error'){
        throw new Error(data.message || 'Apps Script 오류');
      }
      state.allRecordsCache = data.records || [];
      if(Array.isArray(data.targetList)) state.targetList = data.targetList;
      if(Array.isArray(data.carCodes)) {
        state.carCodes = data.carCodes;
        if(selectedCode && !state.carCodes.includes(selectedCode)){
          selectedCode = state.carCodes.length ? state.carCodes[0] : null;
        }
      }
      if(Array.isArray(data.issues)) state.issues = data.issues;
      state.lastSync = Date.now();
      saveState();
      rebuildTargetSet();
    })
    .catch(err=>{
      toast('danger', `동기화 실패: ${err.message || '알 수 없는 오류'}`, 4500);
    })
    .finally(()=>{
      syncing = false;
      render();
    });
}

/* ---------------- Reset Modal ---------------- */
function openResetModal(){ document.getElementById('resetModal').classList.add('show'); }
function closeResetModal(){ document.getElementById('resetModal').classList.remove('show'); }
function confirmReset(){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem('bodyno_last_tab');
  state = defaultState();
  migrateToProjects();
  addingProject = false;
  selectedCode = null;
  selectedDevice = null;
  digits = '';
  lastScan = '';
  statusFilter = 'all';
  colFilterWorker = '';
  colFilterDevice = '';
  colFilterCode = '';
  colFilterDate = '';
  statusSearch = '';
  pendingSearch = '';
  pendingFilterSOff = '';
  pendingFilterStatus = '';
  pendingFilterPlant = '';
  pendingFilterLocation = '';
  pendingFilterSold = '';
  issueSearch = '';
  issueDigits = '';
  issueType = '';
  issueDetailText = '';
  selectedIssueId = null;
  resolutionText = '';
  aggByWorker = false;
  aggByDevice = false;
  aggByDate = false;
  rebuildTargetSet();
  currentTab = 'setup';
  closeResetModal();
  toast('info','모든 데이터가 초기화되었습니다.');
  render();
}

/* ---------------- Tab / Render ---------------- */
function goTab(t){
  if(currentTab === 'capture' && t !== 'capture'){ searchMode = false; searchResult = null; }
  currentTab = t;
  localStorage.setItem('bodyno_last_tab', t);
  if(t === 'capture' && !selectedCode && state.carCodes.length) selectedCode = state.carCodes[0];
  if(t === 'capture' && !selectedDevice && state.devices.length) selectedDevice = state.devices[0];
  if(t === 'status' || t === 'pending' || t === 'issues') syncStatus();
  render();
}
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=> goTab(btn.dataset.tab));
});

document.getElementById('main').addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn || btn.disabled) return;
  const action = btn.dataset.action;
  if(action === 'digit') pressDigit(Number(btn.dataset.digit));
  else if(action === 'backspace') backspace();
  else if(action === 'clear-digits') clearDigits();
  else if(action === 'submit') submitBodyNo();
  else if(action === 'select-code') selectCode(btn.dataset.code);
  else if(action === 'toggle-code') toggleCode();
  else if(action === 'select-device') selectDevice(btn.dataset.device);
  else if(action === 'remove-device') removeDevice(btn.dataset.device);
  else if(action === 'issue-select-code') selectIssueCode(btn.dataset.code);
  else if(action === 'toggle-issue-code') toggleIssueCode();
  else if(action === 'issue-digit') issuePressDigit(Number(btn.dataset.digit));
  else if(action === 'issue-backspace') issueBackspace();
  else if(action === 'issue-clear') issueClearDigits();
  else if(action === 'issue-type') setIssueType(btn.dataset.type);
  else if(action === 'issue-submit') submitIssue();
  else if(action === 'issue-resolve-submit') submitResolution();
});

function render(){
  renderHeader();
  document.querySelectorAll('nav button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === currentTab);
  });
  const main = document.getElementById('main');
  let tabHtml;
  if(currentTab === 'setup') tabHtml = renderSetup();
  else if(currentTab === 'capture') tabHtml = renderCapture();
  else if(currentTab === 'status') tabHtml = renderStatus();
  else if(currentTab === 'pending') tabHtml = renderPending();
  else tabHtml = renderIssues();
  main.innerHTML = `<div id="mainContent">${tabHtml}</div>`;

  const issueDetailInp = document.getElementById('issueDetailInput');
  if(issueDetailInp) issueDetailInp.addEventListener('input', ()=>{ issueDetailText = issueDetailInp.value; });

  const resolutionInp = document.getElementById('resolutionInput');
  if(resolutionInp) resolutionInp.addEventListener('input', ()=>{ resolutionText = resolutionInp.value; });

  const workerInp = document.getElementById('inpWorker');
  if(workerInp) workerInp.addEventListener('input', ()=>{ state.worker = workerInp.value; saveState(); });

  const deviceInp = document.getElementById('inpDeviceNo');
  if(deviceInp) deviceInp.addEventListener('keydown', e=>{ if(e.key==='Enter') addDevice(); });

  const gasUrlInp = document.getElementById('inpGasUrl');
  if(gasUrlInp) gasUrlInp.addEventListener('input', ()=>{ state.gasUrl = gasUrlInp.value; saveState(); });

  const scanInput = document.getElementById('scanInput');
  if(scanInput){
    scanInput.value = '';
    scanInput.focus();
    scanInput.addEventListener('keydown', e=>{
      if(e.key === 'Enter' || e.key === 'Tab'){
        e.preventDefault();
        const val = scanInput.value;
        scanInput.value = '';
        handleScanValue(val);
      }
    });
    scanInput.addEventListener('blur', ()=>{
      setTimeout(()=>{
        const active = document.activeElement;
        const isTypingElsewhere = active && active !== scanInput && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT');
        if(currentTab === 'capture' && state.inputMode === 'scan' && !isTypingElsewhere) scanInput.focus();
      }, 150);
    });
  }

  const issueScanInput = document.getElementById('issueScanInput');
  if(issueScanInput){
    issueScanInput.value = '';
    issueScanInput.focus();
    issueScanInput.addEventListener('keydown', e=>{
      if(e.key === 'Enter' || e.key === 'Tab'){
        e.preventDefault();
        const val = issueScanInput.value;
        issueScanInput.value = '';
        handleIssueScanValue(val);
      }
    });
    issueScanInput.addEventListener('blur', ()=>{
      setTimeout(()=>{
        const active = document.activeElement;
        const isTypingElsewhere = active && active !== issueScanInput && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT');
        if(currentTab === 'issues' && state.inputMode === 'scan' && !isTypingElsewhere) issueScanInput.focus();
      }, 150);
    });
  }

  adjustCompactness();
  syncCodeTagWidth();
}

function syncCodeTagWidth(){
  const keyEl = document.querySelector('#main .keypad .key');
  const codeTags = document.querySelectorAll('#main .code-tag');
  if(!keyEl || !codeTags.length) return;
  const w = keyEl.getBoundingClientRect().width;
  if(w > 0){
    codeTags.forEach(el => { el.style.width = w + 'px'; });
  }
}

function adjustCompactness(){
  updateVhVar();
  const app = document.getElementById('app');
  const main = document.getElementById('main');
  const content = currentTab === 'issues'
    ? (document.getElementById('issueFitSection') || document.getElementById('mainContent'))
    : document.getElementById('mainContent');
  const root = document.documentElement;
  const VARS = ['--adj-gap','--adj-key-pad','--adj-key-font','--adj-box-extra','--adj-btn-pad','--adj-btn-font'];
  const resetVars = () => VARS.forEach(v=>root.style.setProperty(v,'0px'));

  resetVars();
  app.classList.remove('capture-adjustable','hide-stats');

  if(currentTab !== 'capture' && currentTab !== 'issues'){ removeDebugBadge(); return; }
  if(!content){ removeDebugBadge(); return; }

  app.classList.add('capture-adjustable');

  function measureDelta(){
    const mainStyle = getComputedStyle(main);
    const mainPadY = parseFloat(mainStyle.paddingTop) + parseFloat(mainStyle.paddingBottom);
    return main.clientHeight - mainPadY - content.scrollHeight;
  }
  function applyAcc(acc){
    root.style.setProperty('--adj-gap', Math.round(acc.gap)+'px');
    root.style.setProperty('--adj-key-pad', Math.round(acc.keyPad)+'px');
    root.style.setProperty('--adj-key-font', Math.round(acc.keyFont)+'px');
    root.style.setProperty('--adj-box-extra', Math.round(acc.box)+'px');
    root.style.setProperty('--adj-btn-pad', Math.round(acc.btnPad)+'px');
    root.style.setProperty('--adj-btn-font', Math.round(acc.btnFont)+'px');
  }

  // 델타가 0에 가깝게 수렴할 때까지 측정→보정→재측정을 반복 (한 번의 근사식이 아니라 실제로 맞을 때까지 조여감)
  const acc = { gap:0, keyPad:0, keyFont:0, box:0, btnPad:0, btnFont:0 };
  let delta = measureDelta();
  const DAMPING = 0.65; // 매 스텝 보정 비율 (1보다 낮게 줘서 오버슈트/진동 방지)
  const MAX_ITER = 6;
  for(let i=0; i<MAX_ITER && Math.abs(delta) > 2; i++){
    const prevDelta = delta;
    const dir = delta > 0 ? 1 : -1;
    const growDenom = 320, shrinkDenom = 130;
    const mag = Math.min(1, Math.abs(delta) / (dir > 0 ? growDenom : shrinkDenom));
    acc.gap     += dir*mag*10*DAMPING;
    acc.keyPad  += dir*mag*18*DAMPING;
    acc.keyFont += dir*mag*12*DAMPING;
    acc.box     += dir*mag*16*DAMPING;
    acc.btnPad  += dir*mag*10*DAMPING;
    acc.btnFont += dir*mag*5*DAMPING;
    applyAcc(acc);
    delta = measureDelta();
    // 클램프 최솟값에 도달해서 더 줄여도 효과가 없으면(변화가 거의 없으면) 무의미하게 계속 누적하지 않고 중단
    if(Math.abs(delta - prevDelta) < 0.5) break;
  }

  // 그래도 여전히 많이 넘치면(-100px 이상) 오늘등록/누적등록 박스를 숨기고 한 번 더 수렴 시도
  if(delta < -100){
    app.classList.add('hide-stats');
    delta = measureDelta();
    for(let i=0; i<MAX_ITER && Math.abs(delta) > 2; i++){
      const prevDelta = delta;
      const dir = delta > 0 ? 1 : -1;
      const growDenom = 320, shrinkDenom = 130;
      const mag = Math.min(1, Math.abs(delta) / (dir > 0 ? growDenom : shrinkDenom));
      acc.gap     += dir*mag*10*DAMPING;
      acc.keyPad  += dir*mag*18*DAMPING;
      acc.keyFont += dir*mag*12*DAMPING;
      acc.box     += dir*mag*16*DAMPING;
      acc.btnPad  += dir*mag*10*DAMPING;
      acc.btnFont += dir*mag*5*DAMPING;
      applyAcc(acc);
      delta = measureDelta();
      if(Math.abs(delta - prevDelta) < 0.5) break;
    }
  }

  showDebugBadge(delta);
}

// TEMPORARY DEBUG BADGE — 캘리브레이션용, 확인 후 제거 예정
function showDebugBadge(delta){
  let badge = document.getElementById('debugBadge');
  if(!badge){
    badge = document.createElement('div');
    badge.id = 'debugBadge';
    badge.style.cssText = 'position:fixed;bottom:70px;right:8px;z-index:999;background:rgba(0,0,0,.75);color:#fff;font-size:11px;padding:6px 9px;border-radius:8px;font-family:monospace;line-height:1.5;pointer-events:none;';
    document.body.appendChild(badge);
  }
  const keyPad = getComputedStyle(document.documentElement).getPropertyValue('--adj-key-pad').trim();
  const keyFont = getComputedStyle(document.documentElement).getPropertyValue('--adj-key-font').trim();
  badge.textContent = `delta:${delta} keyPad:${keyPad} keyFont:${keyFont}`;
}
function removeDebugBadge(){
  const badge = document.getElementById('debugBadge');
  if(badge) badge.remove();
}

function updateVhVar(){
  const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
function setViewportHeight(){
  updateVhVar();
  if(typeof adjustCompactness === 'function') adjustCompactness();
}
setViewportHeight();
window.addEventListener('resize', setViewportHeight);
window.addEventListener('orientationchange', setViewportHeight);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setViewportHeight);
}

rebuildTargetSet();
render();
if(state.gasUrl) syncStatus();

if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(()=>{ adjustCompactness(); });
}

// 좌우 드래그(스와이프)로 옆 탭으로 전환
(function(){
  const TAB_ORDER = ['setup','capture','issues','pending','status'];
  const mainEl = document.getElementById('main');
  let startX = 0, startY = 0, startTime = 0, blocked = false;
  mainEl.addEventListener('touchstart', (e) => {
    if(e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
    blocked = !!e.target.closest('.agg-table-wrap, textarea, input, .card h3');
  }, { passive:true });
  mainEl.addEventListener('touchend', (e) => {
    if(blocked) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startTime;
    if(dt > 600) return;
    if(Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.5){
      const idx = TAB_ORDER.indexOf(currentTab);
      if(idx === -1) return;
      if(dx < 0 && idx < TAB_ORDER.length - 1) goTab(TAB_ORDER[idx+1]);
      else if(dx > 0 && idx > 0) goTab(TAB_ORDER[idx-1]);
    }
  }, { passive:true });
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* offline shell not critical */ });
  });
}

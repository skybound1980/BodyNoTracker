<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Body No 관리 (클릭테스트)</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F2A3C">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Body No">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1F5;
    --surface:#FFFFFF;
    --ink:#1C2530;
    --muted:#7C8798;
    --line:#DDE2E9;
    --primary:#1F2A3C;
    --primary-2:#2B3A52;
    --accent:#F5A623;
    --accent-ink:#5A3B00;
    --success:#1E9E5A;
    --success-bg:#E7F7EE;
    --danger:#D64545;
    --danger-bg:#FDEBEB;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    overscroll-behavior:none;
    user-select:none;
  }
  input,textarea{user-select:text;}
  #app{
    display:flex;
    flex-direction:column;
    height:100vh;
    height:calc(var(--vh, 1vh) * 100);
    height:100dvh;
    max-width:720px;
    margin:0 auto;
    background:var(--bg);
    position:relative;
    overflow:hidden;
  }
  /* Header */
  header{
    background:var(--primary);
    color:#fff;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    z-index:5;
  }
  header .title{
    font-family:'Bebas Neue',sans-serif;
    font-size:22px;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  header .title .dot{
    width:9px;height:9px;border-radius:50%;
    background:#5B6B85;
    box-shadow:0 0 0 3px rgba(255,255,255,.06);
  }
  header .title .dot.on{background:#3ED17E;}
  header .worker{
    font-size:13px;
    background:rgba(255,255,255,.1);
    padding:6px 12px;
    border-radius:999px;
    font-weight:600;
    max-width:150px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  /* Toast */
  #toast{
    position:absolute;
    top:66px;left:12px;right:12px;
    z-index:20;
    display:none;
    padding:14px 16px;
    border-radius:12px;
    font-weight:700;
    font-size:15px;
    text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,.15);
    animation:slideDown .25s ease;
  }
  @keyframes slideDown{from{transform:translateY(-14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  #toast.success{background:var(--success-bg);color:var(--success);border:1.5px solid var(--success);}
  #toast.danger{background:var(--danger-bg);color:var(--danger);border:1.5px solid var(--danger);}
  #toast.info{background:#EAF1FB;color:#2560B0;border:1.5px solid #2560B0;}

  main{
    flex:1;
    overflow-y:auto;
    padding:16px 16px 24px;
    -webkit-overflow-scrolling:touch;
  }
  .card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
    border:1px solid var(--line);
  }
  .card h3{
    margin:0 0 10px;
    font-size:15px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h3 .badge{
    font-family:'Roboto Mono',monospace;
    font-size:11px;
    background:var(--primary);
    color:#fff;
    padding:2px 7px;
    border-radius:6px;
  }
  .field{margin-bottom:12px;}
  .two-col{display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:14px;}
  .field:last-child{margin-bottom:0;}
  label.lbl{
    display:block;
    font-size:12.5px;
    color:var(--muted);
    font-weight:600;
    margin-bottom:6px;
  }
  input[type=text], input[type=url], input[type=file], select, textarea.ta{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-size:15px;
    font-family:inherit;
    background:#FAFBFC;
    color:var(--ink);
  }
  input[type=text]:focus, input[type=url]:focus, select:focus, textarea.ta:focus{
    outline:none;
    border-color:var(--accent);
    background:#fff;
  }
  textarea.ta{resize:vertical;}
  .help{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}
  .row{display:flex;gap:8px;}
  .row input{flex:1;}
  .device-type-select{flex:0 0 92px;width:92px;font-weight:700;}
  button{font-family:inherit;cursor:pointer;border:none;touch-action:manipulation;}
  .btn{
    padding:12px 16px;
    border-radius:10px;
    font-weight:700;
    font-size:14.5px;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-primary:active{transform:scale(.98);}
  .btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--line);}
  .btn-danger-outline{background:#fff;color:var(--danger);border:1.5px solid var(--danger);}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.45;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .chip{
    display:flex;align-items:center;gap:6px;
    background:var(--primary);
    color:#fff;
    padding:7px 8px 7px 12px;
    border-radius:999px;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:14px;
    letter-spacing:1px;
  }
  .chip button{
    background:rgba(255,255,255,.18);
    color:#fff;
    width:20px;height:20px;
    border-radius:50%;
    font-size:13px;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
  }
  .empty .big{font-size:34px;margin-bottom:8px;}
  .empty p{margin:4px 0;font-size:14px;line-height:1.6;}

  /* Bottom nav */
  nav{
    display:flex;
    background:#fff;
    border-top:1px solid var(--line);
    flex-shrink:0;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;
    background:none;
    padding:10px 4px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:3px;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    min-height:62px;
  }
  nav button .ic{
    font-size:20px;
    height:24px;
    line-height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  nav button.active{color:var(--accent-ink);}
  nav button.active .ic{
    color:var(--accent);
  }

  /* Capture tab */
  .code-select-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:10px;
    margin-top:6px;
  }
  .code-btn{
    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    padding:16px 8px;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:20px;
    letter-spacing:2px;
    color:var(--primary);
  }
  .code-btn.selected{border-color:var(--accent);background:#FFF7E8;color:var(--accent-ink);}

  .code-pill-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
  .code-pill-row .inline-label{
    font-size:15px;font-weight:700;color:var(--muted);margin-right:2px;flex-shrink:0;
  }
  .code-pill{
    background:#fff;
    border:2px solid var(--line);
    border-radius:10px;
    padding:8px 16px;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:15px;
    letter-spacing:1px;
    color:var(--primary);
  }
  .code-pill.selected{border-color:var(--accent);background:#FFF7E8;color:var(--accent-ink);}

  .mode-row{display:flex;gap:10px;}

  .search-row{display:flex;gap:8px;margin-bottom:8px;align-items:stretch;}
  .search-toggle{
    flex:1;
    display:flex;align-items:center;gap:8px;
    background:#EAF1FB;border:1.5px solid #2560B0;border-radius:10px;
    padding:10px 12px;font-size:12.5px;font-weight:600;color:#2560B0;
  }
  .search-toggle input[type=checkbox]{width:17px;height:17px;accent-color:#2560B0;flex-shrink:0;}

  .search-badge{
    flex:1;
    display:flex;align-items:center;justify-content:center;
    border-radius:10px;border:1.5px solid var(--line);
    padding:10px 10px;font-size:13px;font-weight:700;text-align:center;
    font-family:'Roboto Mono',monospace;letter-spacing:.5px;
  }
  .search-badge.empty{color:var(--muted);font-family:'Inter',sans-serif;font-weight:600;font-size:12px;letter-spacing:0;background:#FAFBFC;}
  .search-badge.found{background:var(--success-bg);border-color:var(--success);color:var(--success);}
  .search-badge.notfound{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}

  .mode-btn{
    flex:1;
    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    padding:14px 6px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:13px;
    line-height:1.6;
    color:var(--ink);
  }
  .mode-btn.selected{border-color:var(--accent);background:#FFF7E8;color:var(--accent-ink);}

  .capture-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }
  .capture-head .code-tag{
    font-family:'Bebas Neue',sans-serif;
    font-size:26px;
    letter-spacing:2px;
    background:var(--primary);
    color:#fff;
    padding:4px 14px;
    border-radius:10px;
    flex-shrink:0;
  }

  .capture-stats{display:flex;gap:8px;margin-bottom:10px;}
  .stat-box{
    flex:1;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:6px;
  }
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--primary);line-height:1;}
  .stat-lbl{font-size:15px;color:var(--muted);font-weight:600;}

  .link-btn{
    background:none;color:#2560B0;font-weight:700;font-size:13px;
    text-decoration:underline;
  }

  .digit-boxes{
    display:grid;
    grid-template-columns:repeat(6, 1fr);
    flex:1;
    gap:6px;
    justify-items:center;
  }
  .digit-box{
    width:100%;
    max-width:56px;
    aspect-ratio:1/1.15;
    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue',sans-serif;
    font-size:30px;
    color:var(--primary);
  }
  .digit-box.filled{border-color:var(--primary);}
  .digit-box.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(245,166,35,.18);}

  .keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .key{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:14px;
    font-family:'Bebas Neue',sans-serif;
    font-size:32px;
    color:var(--ink);
    padding:14px 0;
  }
  .key:active{background:#F0F2F5;}
  .key.func{
    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:700;
    color:var(--muted);
  }
  .submit-btn{
    margin-top:10px;
    padding:15px;
    font-size:19px;
    border-radius:14px;
  }

  /* Status tab */
  .stat-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .stat-head .sync{font-size:11.5px;color:var(--muted);}
  .progress-num{
    font-family:'Bebas Neue',sans-serif;
    font-size:44px;
    line-height:1;
    color:var(--primary);
  }
  .progress-num span{font-size:20px;color:var(--muted);font-family:'Inter',sans-serif;font-weight:700;}
  .progress-bar-track{
    height:12px;background:#EDEFF2;border-radius:999px;overflow:hidden;margin-top:10px;
  }
  .progress-bar-fill{
    height:100%;background:linear-gradient(90deg,var(--accent),#FFC15E);
    border-radius:999px;transition:width .3s ease;
  }
  .mini-stats-row{display:flex;gap:8px;margin-top:14px;}
  .mini-stat{
    flex:1;
    border-radius:10px;
    padding:10px 6px;
    text-align:center;
    background:#F5F6F8;
    border:1px solid var(--line);
  }
  .mini-stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--primary);line-height:1;}
  .mini-stat-lbl{font-size:10.5px;color:var(--muted);margin-top:4px;font-weight:600;}
  .mini-stat.mini-in{background:var(--success-bg);border-color:var(--success);}
  .mini-stat.mini-in .mini-stat-num{color:var(--success);}
  .mini-stat.mini-out{background:var(--danger-bg);border-color:var(--danger);}
  .mini-stat.mini-out .mini-stat-num{color:var(--danger);}
  .mini-stat.mini-issue{background:#FFF7E8;border-color:var(--accent);}
  .mini-stat.mini-issue .mini-stat-num{color:var(--accent-ink);}
  .search-box{margin-bottom:10px;}

  .tag{
    display:inline-block;
    font-family:'Inter',sans-serif;
    font-size:10px;
    font-weight:700;
    padding:2px 7px;
    border-radius:6px;
    margin-right:6px;
    letter-spacing:0;
    vertical-align:middle;
  }
  .tag-in{background:var(--success-bg);color:var(--success);}
  .tag-out{background:var(--danger-bg);color:var(--danger);}

  .agg-checks{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;}
  .agg-checks label{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink);}
  .agg-checks input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);}

  .agg-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:10px;}
  .agg-table{width:100%;border-collapse:collapse;font-size:13px;}
  .agg-table th{
    text-align:left;padding:9px 12px;background:#F5F6F8;color:var(--muted);
    font-weight:700;font-size:11px;border-bottom:1.5px solid var(--line);white-space:nowrap;
  }
  .agg-table td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .agg-table tbody tr:last-child td{border-bottom:none;}
  .agg-table td.agg-count{font-weight:700;text-align:right;font-family:'Roboto Mono',monospace;color:var(--primary);}
  .agg-table td.mono-cell{font-family:'Roboto Mono',monospace;font-weight:700;letter-spacing:1px;color:var(--primary);}
  .agg-table tfoot td{font-weight:800;border-top:2px solid var(--primary);background:#FAFBFC;}
  .agg-table th .th-filter{
    width:auto;
    padding:3px 20px 3px 4px;
    border:none;
    background:#F5F6F8;
    color:var(--primary);
    font-size:11px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .agg-table th .th-filter:focus{outline:none;background:#fff;}

  .rec-item{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:8px;
  }
  .rec-item .rec-body{
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:15px;
    letter-spacing:1px;
  }
  .rec-item .rec-sub{
    font-size:11px;color:var(--muted);margin-top:2px;
  }
  .rec-item .rec-meta{
    font-size:11.5px;color:var(--muted);text-align:right;flex-shrink:0;line-height:1.6;
  }
  .rec-item .rec-meta .worker{font-weight:700;color:var(--ink);display:block;}
  .rec-item .rec-meta .rec-device{display:block;color:var(--muted);}

  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.45);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-bg.show{display:flex;}
  .modal{
    background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%;
  }
  .modal h4{margin:0 0 8px;font-size:17px;}
  .modal p{margin:0 0 18px;font-size:13.5px;color:var(--muted);line-height:1.6;}
  .modal .row{gap:10px;}

  @media (min-width:700px){
    header .title{font-size:26px;}
    .digit-box{max-width:70px;}
    .key{padding:26px 0;font-size:32px;}
    main{padding:22px 28px 28px;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title"><span class="dot" id="connDot"></span> BODY NO 관리 (클릭테스트)</div>
    <div class="worker" id="workerBadge">작업자 미설정</div>
  </header>
  <div id="toast"></div>
  <main id="main"></main>
  <nav>
    <button data-tab="setup"><span class="ic">⚙</span>설정</button>
    <button data-tab="capture"><span class="ic">🔢</span>Body No</button>
    <button data-tab="issues"><span class="ic">⚠</span>이상 등록</button>
    <button data-tab="status"><span class="ic">📊</span>현황</button>
    <button data-tab="pending"><span class="ic">⏳</span>미진행</button>
  </nav>
</div>

<div class="modal-bg" id="resetModal">
  <div class="modal">
    <h4>전체 초기화</h4>
    <p>작업자, 차종코드, 연동 설정, 대상 리스트 캐시, 저장된 취득 기록이 모두 삭제됩니다.<br>이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?</p>
    <div class="row">
      <button class="btn btn-outline btn-block" onclick="closeResetModal()">취소</button>
      <button class="btn btn-danger-outline btn-block" onclick="confirmReset()">초기화</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="newProjectModal">
  <div class="modal">
    <h4>새 프로젝트 시작</h4>
    <p>이 기기에 저장된 <b>취득 기록</b>과 <b>대상 리스트</b>만 삭제됩니다.<br>작업자 이름, 차종코드, 장비 정보, 구글 스프레드시트 연동 URL은 그대로 유지됩니다.<br>새 프로젝트용 스프레드시트로 URL을 바꾸셨다면 이 작업으로 정리해주세요.</p>
    <div class="row">
      <button class="btn btn-outline btn-block" onclick="closeNewProjectModal()">취소</button>
      <button class="btn btn-danger-outline btn-block" onclick="confirmNewProject()">시작</button>
    </div>
  </div>
</div>

<script>
/* ---------------- State ---------------- */
const STORAGE_KEY = 'bodyno_tracker_state_v1';
function defaultState(){
  return { worker:'', devices:[], carCodes:[], gasUrl:'', inputMode:'manual', targetList:[], myRecords:[], allRecordsCache:null, lastSync:null, issues:[] };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
  }catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();
let currentTab = state.worker ? 'capture' : 'setup';
let selectedCode = state.carCodes.length ? state.carCodes[0] : null;
let selectedDevice = state.devices.length ? state.devices[0] : null;
let digits = '';
let submitting = false;
let searchMode = false;
let searchResult = null;
let issueSelectedCode = null;
let issueDigits = '';
let issueType = '';
let issueDetailText = '';
let issueSubmitting = false;
let issueSearch = '';
let selectedIssueId = null;
let resolutionText = '';
let resolvingSubmitting = false;
let syncing = false;
let statusSearch = '';
let statusFilter = 'all'; // 'all' | 'in' | 'out'
let colFilterWorker = '';
let colFilterDevice = '';
let colFilterCode = '';
let colFilterDate = '';
let pendingSearch = '';
let pendingFilterSOff = '';
let pendingFilterStatus = '';

let targetSet = new Set();
function targetBodyNo(t){
  return typeof t === 'string' ? t : (t && t.bodyNo) || '';
}
function findTargetMatch(bodyNo){
  const q = normBody(bodyNo);
  return state.targetList.find(t => normBody(targetBodyNo(t)) === q) || null;
}
function rebuildTargetSet(){
  targetSet = new Set(state.targetList.map(t => normBody(targetBodyNo(t))));
}
function isInTarget(bodyNo){
  if(!state.targetList.length) return null; // no target list loaded
  return targetSet.has(normBody(bodyNo));
}

/* ---------------- Utils ---------------- */
function toast(type, msg, ms){
  const el = document.getElementById('toast');
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.display='none'; }, ms || 2200);
}
function normBody(s){ return String(s||'').toUpperCase().replace(/\s+/g,''); }
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleString('ko-KR', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false});
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function scanIcon(size){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;">
    <path d="M3 8V5.5A2.5 2.5 0 0 1 5.5 3H8"/>
    <path d="M16 3h2.5A2.5 2.5 0 0 1 21 5.5V8"/>
    <path d="M21 16v2.5a2.5 2.5 0 0 1-2.5 2.5H16"/>

}

function focusScanInput(){
  const el = document.getElementById('scanInput');
  if(el) el.focus();
}
function normalizeScan(raw){
  const clean = String(raw||'').replace(/[\r\n\t]/g,'').toUpperCase().trim();
  // code is 2-4 alphanumeric chars, optionally followed by one separator, then exactly 6 digits.
  // Anchored match + greedy {2,4} means the split is unambiguous: total length determines code length.
  const m = clean.match(/^([A-Z0-9]{2,4})[\s-]?(\d{6})$/);
  if(!m) return null;
  return { code: m[1], number: m[2] };
}
function handleScanValue(raw){
  const trimmed = String(raw||'').trim();
  if(!trimmed || submitting) return;
  const parsed = normalizeScan(trimmed);
  if(!parsed){
    lastScan = trimmed;
    toast('danger', `인식할 수 없는 바코드 형식입니다: ${trimmed}`);
    render();
    return;
  }
  if(!state.carCodes.includes(parsed.code)){
    lastScan = parsed.code + ' ' + parsed.number;
    toast('danger', `등록되지 않은 차종코드입니다: ${parsed.code}`);
    render();
    return;
  }
  selectedCode = parsed.code;
  digits = parsed.number;
  lastScan = selectedCode + ' ' + digits;
  refreshSearchPreview();
  submitBodyNo();
}
function selectCode(c){ if(c===selectedCode) return; selectedCode = c; digits=''; refreshSearchPreview(); render(); }
function selectDevice(d){ if(d===selectedDevice) return; selectedDevice = d; render(); }
function addDevice(){
  const typeSel = document.getElementById('selDeviceType');
  const noInp = document.getElementById('inpDeviceNo');
  const type = typeSel.value;
  let no = noInp.value.trim();
  if(!no){ toast('danger','장비 번호를 입력해주세요.'); return; }
  if(/^\d+$/.test(no)) no = no.padStart(2, '0'); // 숫자만 입력 시 2자리로 통일 (1 → 01)
  const v = `${type}-${no}`;
  if(state.devices.includes(v)){ toast('danger','이미 등록된 장비입니다.'); return; }
  state.devices.push(v);
  if(!selectedDevice) selectedDevice = v;
  saveState();
  noInp.value = '';
  render();
}
function removeDevice(d){
  state.devices = state.devices.filter(x => x !== d);
  if(selectedDevice === d){
    selectedDevice = state.devices.length ? state.devices[0] : null;
  }
  saveState();
  render();
}
function refreshSearchPreview(){
  if(!searchMode){ searchResult = null; return; }
  if(digits.length === 6 && selectedCode){
    const bodyNo = selectedCode + ' ' + digits;
    const hasTarget = state.targetList.length > 0;
    const match = hasTarget ? findTargetMatch(bodyNo) : null;
    searchResult = { bodyNo, hasTarget, matched: !!match, meta: match || {} };
  } else {
    searchResult = null;
  }
}
function pressDigit(n){
  if(digits.length>=6 || submitting) return;
  digits += String(n);
  refreshSearchPreview();
  render();
}
function backspace(){
  if(submitting) return;
  digits = digits.slice(0,-1);
  refreshSearchPreview();
  render();
}
function clearDigits(){
  if(submitting) return;
  digits = '';
  refreshSearchPreview();
  render();
}

function toggleSearchMode(val){
  searchMode = val;
  refreshSearchPreview();
  render();
}
function renderSearchRow(){
  let badge;
  if(!searchResult){
    badge = `<div class="search-badge empty">6자리 입력 시 표시</div>`;
  } else if(!searchResult.hasTarget){
    badge = `<div class="search-badge empty">대상 리스트 미설정</div>`;
  } else {
    badge = `<div class="search-badge ${searchResult.matched ? 'found' : 'notfound'}">${escapeHtml(searchResult.bodyNo)} ${searchResult.matched ? '대상' : '비대상'}</div>`;
  }
  return `
    <div class="search-row">
      <label class="search-toggle">
        <input type="checkbox" ${searchMode?'checked':''} onchange="toggleSearchMode(this.checked)">
        <span>대상 검색</span>
      </label>
      ${searchMode ? badge : ''}
    </div>
  `;
}
function submitBodyNo(){
  if(digits.length !== 6 || submitting) return;
  const bodyNo = selectedCode + ' ' + digits;

  const dupLocal = state.myRecords.some(r => normBody(r.bodyNo) === normBody(bodyNo));
  if(dupLocal){
    toast('danger', `이미 등록된 Body No 입니다: ${bodyNo}`);
    return;
  }
  if(!state.gasUrl){
    toast('danger','설정 화면에서 구글 스프레드시트 연동 URL을 먼저 입력해주세요.');
    return;
  }

  submitting = true;
  render();

  const payload = { worker: state.worker, device: selectedDevice || '', number: digits, bodyNo: bodyNo, timestamp: new Date().toISOString() };

  fetch(state.gasUrl, { method:'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success'){
        const rec = { worker: state.worker, device: payload.device, number: digits, bodyNo: bodyNo, ts: Date.now(), timestamp: payload.timestamp };
        state.myRecords.push(rec);
        if(state.allRecordsCache !== null) state.allRecordsCache.push(rec);
        saveState();
        const inTarget = isInTarget(bodyNo);
        if(inTarget === false){
          toast('info', `⚠ 대상외 등록: ${bodyNo} (대상 리스트에 없음)`, 3200);
        } else {
          toast('success', `저장 완료: ${bodyNo}`);
        }
        digits = '';
        searchResult = null;
      } else if(data.result === 'duplicate'){
        toast('danger', data.message || `이미 등록된 Body No 입니다: ${bodyNo}`);
      } else {
        toast('danger', data.message || '저장 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    })
    .catch(()=>{
      toast('danger','네트워크 오류로 저장하지 못했습니다. 다시 시도해주세요.');
    })
    .finally(()=>{
      submitting = false;
      render();
    });
}

function getStatusData(){
  const records = state.allRecordsCache !== null ? state.allRecordsCache : state.myRecords;
  const hasTarget = state.targetList.length > 0;
  const total = state.targetList.length;
  const inTargetRecords = hasTarget ? records.filter(r => isInTarget(r.bodyNo)) : [];
  const outTargetRecords = hasTarget ? records.filter(r => !isInTarget(r.bodyNo)) : [];
  const completed = hasTarget ? inTargetRecords.length : records.length;
  const pct = hasTarget ? Math.min(100, Math.round(completed/total*100)) : null;

  let base = records;
  if(hasTarget && statusFilter === 'in') base = inTargetRecords;
  else if(hasTarget && statusFilter === 'out') base = outTargetRecords;

  const workerOptions = [...new Set(records.map(r=>r.worker).filter(Boolean))].sort();
  const deviceOptions = [...new Set(records.map(r=>r.device).filter(Boolean))].sort();
  const dateOptions = [...new Set(records.map(r=>new Date(r.ts||r.timestamp).toLocaleDateString('ko-KR')))]
    .sort((a,b)=> new Date(b) - new Date(a));
  const codeOptions = state.carCodes.length ? state.carCodes : [...new Set(records.map(r=>(r.bodyNo||'').split(' ')[0]).filter(Boolean))];

  const filtered = base.filter(r=>{
    if(colFilterWorker && r.worker !== colFilterWorker) return false;
    if(colFilterDevice && r.device !== colFilterDevice) return false;
    if(colFilterCode && !normBody(r.bodyNo).startsWith(normBody(colFilterCode))) return false;
    if(colFilterDate && new Date(r.ts||r.timestamp).toLocaleDateString('ko-KR') !== colFilterDate) return false;
    if(!statusSearch) return true;
    const q = statusSearch.toUpperCase().replace(/\s+/g,'');
    return normBody(r.bodyNo).includes(q)
      || String(r.worker||'').toUpperCase().includes(q)
      || String(r.device||'').toUpperCase().replace(/\s+/g,'').includes(q);
  }).slice().sort((a,b)=> new Date(b.ts||b.timestamp) - new Date(a.ts||a.timestamp));

  return { records, hasTarget, total, inTargetRecords, outTargetRecords, completed, pct, filtered, workerOptions, deviceOptions, dateOptions, codeOptions };
}

function renderRecRow(r, hasTarget){
  const inT = hasTarget ? isInTarget(r.bodyNo) : null;
  const tag = hasTarget ? `<span class="tag ${inT ? 'tag-in' : 'tag-out'}">${inT ? '대상' : '대상외'}</span>` : '';
  return `
    <tr>
      <td>${tag}</td>
      <td class="mono-cell">${escapeHtml(r.bodyNo)}</td>
      <td>${escapeHtml(r.worker||'')}</td>
      <td>${escapeHtml(r.device||'')}</td>
      <td>${fmtTime(r.ts||r.timestamp)}</td>
    </tr>
  `;
}

function renderStatusList(filtered, hasTarget){

  const workerHeader = workerOptions.length ? `

      <select class="th-filter" onchange="setColFilter('worker', this.value)">
        <option value="" ${!colFilterWorker?'selected':''}>작업자: 전체</option>
        ${workerOptions.map(w=>`<option value="${escapeHtml(w)}" ${colFilterWorker===w?'selected':''}>${escapeHtml(w)}</option>`).join('')}
      </select>
    </th>
  ` : `<th>작업자</th>`;

  const deviceHeader = deviceOptions.length ? `
    <th>
      <select class="th-filter" onchange="setColFilter('device', this.value)">
        <option value="" ${!colFilterDevice?'selected':''}>장비: 전체</option>
        ${deviceOptions.map(d=>`<option value="${escapeHtml(d)}" ${colFilterDevice===d?'selected':''}>${escapeHtml(d)}</option>`).join('')}
      </select>

  const dateHeader = dateOptions.length ? `
    <th>
      <select class="th-filter" onchange="setColFilter('date', this.value)">
        <option value="" ${!colFilterDate?'selected':''}>등록시간: 전체</option>
        ${dateOptions.map(d=>`<option value="${escapeHtml(d)}" ${colFilterDate===d?'selected':''}>${escapeHtml(d)}</option>`).join('')}
      </select>
    </th>
  ` : `<th>등록시간</th>`;

  return `
    <div class="agg-table-wrap">

        </thead>

      </table>

  `;
}

function renderAggBody(){
  if(!aggByWorker && !aggByDevice && !aggByDate && !aggByTargetStatus){
    return `<div class="help">기준을 하나 이상 선택하면 집계표가 나타납니다.</div>`;
  }
  const { filtered, hasTarget } = getStatusData();
  const useTargetDim = aggByTargetStatus && hasTarget;
  const groups = {};
  filtered.forEach(r=>{
    const parts = [];
    if(aggByDate) parts.push(new Date(r.ts||r.timestamp).toLocaleDateString('ko-KR'));
    if(useTargetDim) parts.push(isInTarget(r.bodyNo) ? '대상' : '대상외');
    if(aggByWorker) parts.push(r.worker || '(미상)');
    if(aggByDevice) parts.push(r.device || '(미지정)');
    const key = parts.join('|||');
    if(!groups[key]) groups[key] = { parts, count: 0 };
    groups[key].count++;
  });
  const rows = Object.values(groups).sort((a,b)=> b.count - a.count);

  const headers = [];
  if(aggByDate) headers.push('날짜');
  if(useTargetDim) headers.push('대상여부');
  if(aggByWorker) headers.push('작업자');
  if(aggByDevice) headers.push('장비');
  headers.push('수량');

  if(!rows.length){
    return `<div class="empty" style="padding:20px 10px;"><p>집계할 데이터가 없습니다.</p></div>`;
  }

  const targetColIdx = useTargetDim ? (aggByDate ? 1 : 0) : -1; // index within r.parts

  return `
    <div class="agg-table-wrap">
      <table class="agg-table">
        <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>${r.parts.map((p,i)=>{
            if(i === targetColIdx){
              const cls = p === '대상' ? 'tag-in' : 'tag-out';
              return `<td><span class="tag ${cls}" style="margin-right:0;">${escapeHtml(p)}</span></td>`;
            }
            return `<td>${escapeHtml(p)}</td>`;
          }).join('')}<td class="agg-count">${r.count}</td></tr>`).join('')}
        </tbody>
        <tfoot>
          <tr><td colspan="${headers.length-1}">합계</td><td class="agg-count">${filtered.length}</td></tr>
        </tfoot>
      </table>
    </div>
  `;
}
function toggleAgg(dim){
  if(dim === 'worker') aggByWorker = !aggByWorker;
  else if(dim === 'device') aggByDevice = !aggByDevice;
  else if(dim === 'date') aggByDate = !aggByDate;
  else if(dim === 'target') aggByTargetStatus = !aggByTargetStatus;
  render();
}

function onStatusSearchInput(val){
  statusSearch = val;
  const { hasTarget, filtered } = getStatusData();

      <div class="mini-stat mini-issue"><div class="mini-stat-num">${state.issues.length}</div><div class="mini-stat-lbl">이상${unresolvedIssues ? ` (미조치 ${unresolvedIssues})` : ''}</div></div>

  return `

      <h3>집계 보기</h3>

        <label><input type="checkbox" ${aggByDate?'checked':''} onchange="toggleAgg('date')"> 일별</label>
        ${hasTarget ? `<label><input type="checkbox" ${aggByTargetStatus?'checked':''} onchange="toggleAgg('target')"> 대상</label>` : ''}
        <label><input type="checkbox" ${aggByWorker?'checked':''} onchange="toggleAgg('worker')"> 작업자</label>

    <div class="card">
      <h3>전체 리스트 (<span id="statusListCount">${filtered.length}</span>건)</h3>
      <input type="text" class="search-box" placeholder="Body No, 작업자, 장비번호 검색" value="${escapeHtml(statusSearch)}" oninput="onStatusSearchInput(this.value)" style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;">
      <div id="statusListItems">${renderStatusList(filtered, hasTarget)}</div>

function setStatusFilter(f){
  statusFilter = f;
  render();
}
function setColFilter(type, value){
  if(type === 'worker') colFilterWorker = value;

/* ---------------- Pending (미진행) Tab ---------------- */
function dateOnly(v){
  if(!v) return '';
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString('ko-KR');
}
function pendingMeta(t){ return (typeof t === 'object' && t) ? t : {}; }

function getPendingData(){
  const hasTarget = state.targetList.length > 0;
  if(!hasTarget) return { hasTarget, total: 0, pending: [], registeredCount: 0, filtered: [], sOffOptions: [], statusOptions: [], plantOptions: [], locationOptions: [], soldOptions: [] };
  const records = state.allRecordsCache !== null ? state.allRecordsCache : state.myRecords;
  const registeredSet = new Set(records.map(r => normBody(r.bodyNo)));
  const pending = state.targetList.filter(t => !registeredSet.has(normBody(targetBodyNo(t))));

  const sOffOptions = [...new Set(pending.map(t=>dateOnly(pendingMeta(t).sOff)).filter(Boolean))]
    .sort((a,b)=> new Date(b) - new Date(a));
  const statusOptions = [...new Set(pending.map(t=>pendingMeta(t).vehicleStatus).filter(Boolean))].sort();
  const plantOptions = [...new Set(pending.map(t=>pendingMeta(t).shippingPlant).filter(Boolean))].sort();
  const locationOptions = [...new Set(pending.map(t=>pendingMeta(t).location).filter(Boolean))].sort();
  const soldOptions = [...new Set(pending.map(t=>pendingMeta(t).soldStatus).filter(Boolean))].sort();

  const filtered = filterPending(pending);

  return { hasTarget, total: state.targetList.length, pending, registeredCount: state.targetList.length - pending.length, filtered, sOffOptions, statusOptions, plantOptions, locationOptions, soldOptions };
}
function filterPending(pending){
  return pending.filter(t=>{
    const meta = pendingMeta(t);
    if(pendingFilterSOff && dateOnly(meta.sOff) !== pendingFilterSOff) return false;
    if(pendingFilterStatus && meta.vehicleStatus !== pendingFilterStatus) return false;
    if(pendingFilterPlant && meta.shippingPlant !== pendingFilterPlant) return false;
    if(pendingFilterLocation && meta.location !== pendingFilterLocation) return false;
    if(pendingFilterSold && meta.soldStatus !== pendingFilterSold) return false;
    if(!pendingSearch) return true;
    const q = pendingSearch.toUpperCase().replace(/\s+/g,'');
    if(normBody(targetBodyNo(t)).includes(q)) return true;
    return [meta.sOff, meta.vehicleStatus, meta.shippingPlant, meta.location, meta.soldStatus]
      .some(v => String(v||'').toUpperCase().replace(/\s+/g,'').includes(q));
  });
}
function renderPendingRow(t){
  const bodyNo = targetBodyNo(t);
  const meta = pendingMeta(t);
  return `
    <tr>
      <td class="mono-cell">${escapeHtml(bodyNo)}</td>
      <td>${escapeHtml(dateOnly(meta.sOff))}</td>
      <td>${escapeHtml(meta.vehicleStatus||'')}</td>
      <td>${escapeHtml(meta.shippingPlant||'')}</td>
      <td>${escapeHtml(meta.location||'')}</td>
      <td>${escapeHtml(meta.soldStatus||'')}</td>
    </tr>
  `;
}
function pendingFilterHeader(label, type, current, options){
  if(!options.length) return `<th>${label}</th>`;
  return `
    <th>
      <select class="th-filter" onchange="setPendingColFilter('${type}', this.value)">
        <option value="" ${!current?'selected':''}>${label}: 전체</option>
        ${options.map(o=>`<option value="${escapeHtml(o)}" ${current===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
      </select>
    </th>
  `;
}
function renderPendingList(filtered, opts){
  const rows = filtered.length
    ? filtered.map(t => renderPendingRow(t)).join('')
    : `<tr><td colspan="6" style="text-align:center;padding:24px 10px;color:var(--muted);">미진행 항목이 없습니다. 🎉</td></tr>`;
  const headers = [
    `<th>Body No</th>`,
    pendingFilterHeader('S/Off', 'sOff', pendingFilterSOff, opts.sOffOptions),
    pendingFilterHeader('차량상태', 'status', pendingFilterStatus, opts.statusOptions),
    pendingFilterHeader('출하장', 'plant', pendingFilterPlant, opts.plantOptions),
    pendingFilterHeader('로케이션', 'location', pendingFilterLocation, opts.locationOptions),
    pendingFilterHeader('판매여부', 'sold', pendingFilterSold, opts.soldOptions)
  ].join('');
  return `
    <div class="agg-table-wrap">
      <table class="agg-table">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
function setPendingColFilter(type, value){
  if(type === 'sOff') pendingFilterSOff = value;
  else if(type === 'status') pendingFilterStatus = value;
  else if(type === 'plant') pendingFilterPlant = value;
  else if(type === 'location') pendingFilterLocation = value;
  else if(type === 'sold') pendingFilterSold = value;
  render();
}
function onPendingSearchInput(val){
  pendingSearch = val;
  const data = getPendingData();
  const countEl = document.getElementById('pendingListCount');
  const listEl = document.getElementById('pendingListItems');
  if(countEl) countEl.textContent = data.filtered.length;
  if(listEl) listEl.innerHTML = renderPendingList(data.filtered, data);
}
function renderPending(){
  const data = getPendingData();
  const { hasTarget, total, pending, registeredCount, filtered } = data;
  if(!hasTarget){
    return `<div class="empty"><div class="big">📋</div><p>설정 화면에서<br><b>대상 리스트</b>를 동기화하면<br>미진행 현황을 볼 수 있습니다.</p>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="goTab('setup')">설정으로 이동</button></div>`;
  }
  const pct = total > 0 ? Math.round(registeredCount/total*100) : 0;
  const syncLabel = state.lastSync ? `마지막 동기화: ${fmtTime(state.lastSync)}` : (state.gasUrl ? '아직 동기화되지 않음' : '연동 URL 미설정 — 이 기기의 기록만 표시됩니다');

  return `
    <div class="card">
      <div class="stat-head">
        <h3 style="margin:0;">미진행 현황</h3>

      </div>
      <div class="sync" style="margin-bottom:10px;">${syncLabel}</div>
      <div class="progress-num">${pending.length}<span> / ${total}건 미진행</span></div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--danger),#F0A0A0);"></div></div>
      <div class="help" style="margin-top:8px;">완료 ${registeredCount}건 / 전체 ${total}건 (${pct}%)</div>
    </div>

    <div class="card">
      <h3>미진행 리스트 (<span id="pendingListCount">${filtered.length}</span>건)</h3>
      <input type="text" class="search-box" placeholder="Body No 검색" value="${escapeHtml(pendingSearch)}" oninput="onPendingSearchInput(this.value)" style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;">
      <div id="pendingListItems">${renderPendingList(filtered, data)}</div>
    </div>
  `;
}

}
function handleIssueScanValue(raw){
  const trimmed = String(raw||'').trim();
  if(!trimmed) return;
  const parsed = normalizeScan(trimmed);
  if(!parsed){
    toast('danger', `인식할 수 없는 바코드 형식입니다: ${trimmed}`);
    return;
  }
  if(!state.carCodes.includes(parsed.code)){
    toast('danger', `등록되지 않은 차종코드입니다: ${parsed.code}`);
    return;
  }
  issueSelectedCode = parsed.code;
  issueDigits = parsed.number;
  render();
}

function issuePressDigit(n){
  if(issueDigits.length>=6 || issueSubmitting) return;
  issueDigits += String(n);
  render();
}
function issueBackspace(){
  if(issueSubmitting) return;
  issueDigits = issueDigits.slice(0,-1);
  render();
}
function issueClearDigits(){
  if(issueSubmitting) return;
  issueDigits = '';
  render();
}
function selectIssueCode(c){
  if(c===issueSelectedCode) return;
  issueSelectedCode = c;
  issueDigits = '';
  render();
}
function setIssueType(t){
  issueType = t;
  render();
}
function submitIssue(){
  if(issueDigits.length !== 6 || !issueSelectedCode || !issueType || issueSubmitting) return;
  if(!state.gasUrl){ toast('danger','설정 화면에서 구글 스프레드시트 연동 URL을 먼저 입력해주세요.'); return; }
  const bodyNo = issueSelectedCode + ' ' + issueDigits;
  const id = genId();
  issueSubmitting = true;
  render();

  const payload = { type:'issueCreate', id, worker: state.worker, bodyNo, issueType, detail: issueDetailText, timestamp: new Date().toISOString() };
  fetch(state.gasUrl, { method:'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success'){
        state.issues.push({ id, timestamp: payload.timestamp, worker: state.worker, bodyNo, issueType, detail: issueDetailText, resolved: false, resolutionDetail:'', resolvedAt:'', resolvedBy:'' });
        saveState();
        toast('success', `이상 등록 완료: ${bodyNo} (${issueType})`);
        issueDigits = '';
        issueType = '';
        issueDetailText = '';
      } else {
        toast('danger', data.message || '이상 등록 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    })
    .catch(()=>{
      toast('danger','네트워크 오류로 등록하지 못했습니다. 다시 시도해주세요.');
    })
    .finally(()=>{
      issueSubmitting = false;
      render();
    });
}

function selectIssueForResolve(id){
  selectedIssueId = (selectedIssueId === id) ? null : id;
  resolutionText = '';
  render();
}
function cancelResolution(){
  selectedIssueId = null;
  resolutionText = '';
  render();
}
function renderIssueResolvePanel(){
  if(!selectedIssueId) return '';
  const issue = state.issues.find(i => i.id === selectedIssueId);
  if(!issue){ selectedIssueId = null; return ''; }
  return `
    <div class="card" style="border-color:var(--accent);background:#FFFBF2;">
      <h3>이상점 조치 입력</h3>
      <div class="help" style="margin-bottom:10px;font-weight:700;color:var(--ink);">${escapeHtml(issue.bodyNo)} · ${escapeHtml(issue.issueType)}</div>
      ${issue.detail ? `<div class="help" style="margin-bottom:10px;">${escapeHtml(issue.detail)}</div>` : ''}
      <div class="field">
        <label class="lbl">조치내용</label>
        <textarea id="resolutionInput" class="ta" rows="3" placeholder="조치한 내용을 입력하세요">${escapeHtml(resolutionText)}</textarea>
      </div>
      <div class="help" style="margin-bottom:10px;">조치 장비: <b>${selectedDevice ? escapeHtml(selectedDevice) : '미선택'}</b>${!selectedDevice ? ' (설정에서 장비를 선택하면 함께 기록됩니다)' : ''}</div>
      <div class="row">
        <button class="btn btn-outline btn-block" onclick="cancelResolution()">취소</button>
        <button class="btn btn-primary btn-block" data-action="issue-resolve-submit" ${resolvingSubmitting ? 'disabled' : ''}>${resolvingSubmitting ? '처리 중...' : '조치완료 처리'}</button>
      </div>
    </div>
  `;
}
function submitResolution(){
  if(!selectedIssueId || resolvingSubmitting) return;
  if(!resolutionText.trim()){ toast('danger','조치내용을 입력해주세요.'); return; }
  if(!state.gasUrl){ toast('danger','설정 화면에서 구글 스프레드시트 연동 URL을 먼저 입력해주세요.'); return; }
  resolvingSubmitting = true;
  render();

  const payload = { type:'issueResolve', id: selectedIssueId, resolutionDetail: resolutionText, resolvedBy: state.worker, resolvedDevice: selectedDevice || '', resolvedAt: new Date().toISOString() };
  fetch(state.gasUrl, { method:'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success'){
        const issue = state.issues.find(i => i.id === selectedIssueId);
        if(issue){
          issue.resolved = true;
          issue.resolutionDetail = payload.resolutionDetail;
          issue.resolvedAt = payload.resolvedAt;
          issue.resolvedBy = payload.resolvedBy;
          issue.resolvedDevice = payload.resolvedDevice;
        }
        saveState();
        toast('success','조치 완료 처리되었습니다.');
        selectedIssueId = null;
        resolutionText = '';
      } else {
        toast('danger', data.message || '처리 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    })
    .catch(()=>{
      toast('danger','네트워크 오류로 처리하지 못했습니다. 다시 시도해주세요.');
    })
    .finally(()=>{
      resolvingSubmitting = false;
      render();
    });
}

function renderIssueListCard(){
  const list = state.issues.slice().sort((a,b)=>{
    if(!!a.resolved !== !!b.resolved) return a.resolved ? 1 : -1;
    return new Date(b.timestamp) - new Date(a.timestamp);
  });
  const q = issueSearch.trim().toUpperCase().replace(/\s+/g,'');
  const filtered = q ? list.filter(i => normBody(i.bodyNo).includes(q)) : list;

  const rows = filtered.length ? filtered.map(i=>{
    const checkbox = i.resolved
      ? `<span class="tag tag-in">완료</span>`
      : `<input type="checkbox" ${selectedIssueId===i.id?'checked':''} onchange="selectIssueForResolve('${i.id}')">`;
    const statusTag = i.resolved
      ? `<span class="tag tag-in">조치완료</span>`
      : `<span class="tag tag-out">미조치</span>`;
    return `
      <tr>
        <td>${checkbox}</td>
        <td class="mono-cell">${escapeHtml(i.bodyNo)}</td>
        <td>${escapeHtml(i.issueType)}</td>
        <td>${statusTag}</td>
        <td>${fmtTime(i.timestamp)}</td>
      </tr>
    `;
  }).join('') : `<tr><td colspan="5" style="text-align:center;padding:24px 10px;color:var(--muted);">등록된 이상점이 없습니다.</td></tr>`;

  return `
    <div class="card">
      <h3>이상점 리스트 (${filtered.length}건)</h3>
      <input type="text" class="search-box" placeholder="Body No 검색" value="${escapeHtml(issueSearch)}" oninput="onIssueSearchInput(this.value)" style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;">
      <div class="agg-table-wrap">
        <table class="agg-table">
          <thead><tr><th>선택</th><th>Body No</th><th>이상항목</th><th>상태</th><th>등록시간</th></tr></thead>
          <tbody id="issueListBody">${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}
function onIssueSearchInput(val){
  issueSearch = val;
  const listEl = document.getElementById('issueListBody');
  if(!listEl) return;
  const list = state.issues.slice().sort((a,b)=>{
    if(!!a.resolved !== !!b.resolved) return a.resolved ? 1 : -1;
    return new Date(b.timestamp) - new Date(a.timestamp);
  });
  const q = issueSearch.trim().toUpperCase().replace(/\s+/g,'');
  const filtered = q ? list.filter(i => normBody(i.bodyNo).includes(q)) : list;
  listEl.innerHTML = filtered.length ? filtered.map(i=>{
    const checkbox = i.resolved
      ? `<span class="tag tag-in">완료</span>`
      : `<input type="checkbox" ${selectedIssueId===i.id?'checked':''} onchange="selectIssueForResolve('${i.id}')">`;
    const statusTag = i.resolved
      ? `<span class="tag tag-in">조치완료</span>`
      : `<span class="tag tag-out">미조치</span>`;
    return `<tr><td>${checkbox}</td><td class="mono-cell">${escapeHtml(i.bodyNo)}</td><td>${escapeHtml(i.issueType)}</td><td>${statusTag}</td><td>${fmtTime(i.timestamp)}</td></tr>`;
  }).join('') : `<tr><td colspan="5" style="text-align:center;padding:24px 10px;color:var(--muted);">등록된 이상점이 없습니다.</td></tr>`;
}

function syncStatus(){
  if(!state.gasUrl){ toast('danger','설정 화면에서 연동 URL을 먼저 입력해주세요.'); return; }
  if(syncing) return;
  syncing = true;
  render();
  fetch(state.gasUrl + '?action=list')
    .then(res=>{
      if(!res.ok) throw new Error(`서버 응답 오류 (HTTP ${res.status})`);
      return res.text();
    })
    .then(text=>{
      let data;
      try{
        data = JSON.parse(text);
      }catch(e){
        // Apps Script often returns an HTML login/error page instead of JSON when
        // the deployment isn't set to "Anyone" access, or wasn't redeployed after edits.
        throw new Error('응답이 JSON이 아닙니다. 배포 권한(모든 사용자) 또는 재배포 여부를 확인해주세요.');
      }
      if(data && data.result === 'error'){
        throw new Error(data.message || 'Apps Script 오류');
      }
      state.allRecordsCache = data.records || [];
      if(Array.isArray(data.targetList)) state.targetList = data.targetList;
      if(Array.isArray(data.carCodes)) {
        state.carCodes = data.carCodes;
        if(selectedCode && !state.carCodes.includes(selectedCode)){
          selectedCode = state.carCodes.length ? state.carCodes[0] : null;
        }
      }
      if(Array.isArray(data.issues)) state.issues = data.issues;
      state.lastSync = Date.now();
      saveState();
      rebuildTargetSet();
    })
    .catch(err=>{
      toast('danger', `동기화 실패: ${err.message || '알 수 없는 오류'}`, 4500);
    })
    .finally(()=>{
      syncing = false;
      render();
    });
}

/* ---------------- Reset Modal ---------------- */
function openResetModal(){ document.getElementById('resetModal').classList.add('show'); }
function closeResetModal(){ document.getElementById('resetModal').classList.remove('show'); }
function openNewProjectModal(){ document.getElementById('newProjectModal').classList.add('show'); }
function closeNewProjectModal(){ document.getElementById('newProjectModal').classList.remove('show'); }
function confirmNewProject(){
  state.myRecords = [];
  state.allRecordsCache = null;
  state.lastSync = null;
  state.targetList = [];
  state.issues = [];
  saveState();
  rebuildTargetSet();
  statusFilter = 'all';
  colFilterWorker = '';
  colFilterDevice = '';
  colFilterCode = '';
  colFilterDate = '';
  statusSearch = '';
  pendingSearch = '';
  pendingFilterSOff = '';
  pendingFilterStatus = '';
  pendingFilterPlant = '';
  pendingFilterLocation = '';
  pendingFilterSold = '';
  issueSearch = '';
  issueDigits = '';
  issueType = '';
  issueDetailText = '';
  selectedIssueId = null;
  resolutionText = '';
  aggByWorker = false;
  aggByDevice = false;
  aggByDate = false;
  aggByTargetStatus = false;
  digits = '';
  lastScan = '';
  closeNewProjectModal();
  toast('info','새 프로젝트를 시작합니다. 기록과 대상 리스트가 정리되었습니다.');
  render();
}
function confirmReset(){
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
  selectedCode = null;
  selectedDevice = null;
  digits = '';
  lastScan = '';
  statusFilter = 'all';
  colFilterWorker = '';
  colFilterDevice = '';
  colFilterCode = '';
  colFilterDate = '';
  statusSearch = '';
  pendingSearch = '';
  pendingFilterSOff = '';
  pendingFilterStatus = '';
  pendingFilterPlant = '';
  pendingFilterLocation = '';
  pendingFilterSold = '';
  issueSearch = '';
  issueDigits = '';
  issueType = '';
  issueDetailText = '';
  selectedIssueId = null;
  resolutionText = '';
  aggByWorker = false;
  aggByDevice = false;
  aggByDate = false;
  aggByTargetStatus = false;
  rebuildTargetSet();
  currentTab = 'setup';
  closeResetModal();
  toast('info','모든 데이터가 초기화되었습니다.');
  render();
}

/* ---------------- Tab / Render ---------------- */
function goTab(t){
  if(currentTab === 'capture' && t !== 'capture'){ searchMode = false; searchResult = null; }
  currentTab = t;
  if(t === 'capture' && !selectedCode && state.carCodes.length) selectedCode = state.carCodes[0];
  if(t === 'capture' && !selectedDevice && state.devices.length) selectedDevice = state.devices[0];
  if(t === 'status' || t === 'pending' || t === 'issues') syncStatus();
  render();
}
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=> goTab(btn.dataset.tab));
});

const KEYPAD_CLICK_ACTIONS = ['digit','backspace','clear-digits','issue-digit','issue-backspace','issue-clear'];

// [TEST BUILD] 숫자 키패드류 액션은 click(누르고 뗄 때)으로 동작 — pointerdown 경로에서는 건너뜀
document.getElementById('main').addEventListener('pointerdown', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn || btn.disabled) return;
  const action = btn.dataset.action;
  if(KEYPAD_CLICK_ACTIONS.includes(action)) return; // click 리스너가 처리
  e.preventDefault();
  if(action === 'submit') submitBodyNo();
  else if(action === 'select-code') selectCode(btn.dataset.code);
  else if(action === 'select-device') selectDevice(btn.dataset.device);
  else if(action === 'remove-device') removeDevice(btn.dataset.device);
  else if(action === 'issue-select-code') selectIssueCode(btn.dataset.code);
  else if(action === 'issue-type') setIssueType(btn.dataset.type);
  else if(action === 'issue-submit') submitIssue();
  else if(action === 'issue-resolve-submit') submitResolution();
}, { passive:false });

// [TEST BUILD] 숫자 키패드류 전용 click 리스너 (누르고 뗄 때만 반응)
document.getElementById('main').addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn || btn.disabled) return;
  const action = btn.dataset.action;
  if(!KEYPAD_CLICK_ACTIONS.includes(action)) return;
  if(action === 'digit') pressDigit(Number(btn.dataset.digit));
  else if(action === 'backspace') backspace();
  else if(action === 'clear-digits') clearDigits();
  else if(action === 'issue-digit') issuePressDigit(Number(btn.dataset.digit));
  else if(action === 'issue-backspace') issueBackspace();
  else if(action === 'issue-clear') issueClearDigits();
});

function render(){
  renderHeader();
  document.querySelectorAll('nav button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === currentTab);
  });
  const main = document.getElementById('main');
  if(currentTab === 'setup') main.innerHTML = renderSetup();
  else if(currentTab === 'capture') main.innerHTML = renderCapture();
  else if(currentTab === 'status') main.innerHTML = renderStatus();
  else if(currentTab === 'pending') main.innerHTML = renderPending();
  else main.innerHTML = renderIssues();

  const issueDetailInp = document.getElementById('issueDetailInput');
  if(issueDetailInp) issueDetailInp.addEventListener('input', ()=>{ issueDetailText = issueDetailInp.value; });

  const resolutionInp = document.getElementById('resolutionInput');
  if(resolutionInp) resolutionInp.addEventListener('input', ()=>{ resolutionText = resolutionInp.value; });

  const workerInp = document.getElementById('inpWorker');
  if(workerInp) workerInp.addEventListener('input', ()=>{ state.worker = workerInp.value; saveState(); });

  const deviceInp = document.getElementById('inpDeviceNo');
  if(deviceInp) deviceInp.addEventListener('keydown', e=>{ if(e.key==='Enter') addDevice(); });

  const gasUrlInp = document.getElementById('inpGasUrl');
  if(gasUrlInp) gasUrlInp.addEventListener('input', ()=>{ state.gasUrl = gasUrlInp.value; saveState(); });

  const scanInput = document.getElementById('scanInput');
  if(scanInput){
    scanInput.value = '';
    scanInput.focus();
    scanInput.addEventListener('keydown', e=>{
      if(e.key === 'Enter' || e.key === 'Tab'){
        e.preventDefault();
        const val = scanInput.value;
        scanInput.value = '';
        handleScanValue(val);
      }
    });
    scanInput.addEventListener('blur', ()=>{
      setTimeout(()=>{
        if(currentTab === 'capture' && state.inputMode === 'scan') scanInput.focus();
      }, 150);
    });
  }

  const issueScanInput = document.getElementById('issueScanInput');
  if(issueScanInput){
    issueScanInput.value = '';
    issueScanInput.focus();
    issueScanInput.addEventListener('keydown', e=>{
      if(e.key === 'Enter' || e.key === 'Tab'){
        e.preventDefault();
        const val = issueScanInput.value;
        issueScanInput.value = '';
        handleIssueScanValue(val);
      }
    });
    issueScanInput.addEventListener('blur', ()=>{
      setTimeout(()=>{
        if(currentTab === 'issues' && state.inputMode === 'scan') issueScanInput.focus();
      }, 150);
    });
  }
}

function setViewportHeight(){
  const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
setViewportHeight();
window.addEventListener('resize', setViewportHeight);
window.addEventListener('orientationchange', setViewportHeight);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setViewportHeight);
}

rebuildTargetSet();
render();
if(state.gasUrl) syncStatus();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* offline shell not critical */ });
  });
}
</script>
